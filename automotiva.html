<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Luzes do Painel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');
  :root {
    --bg:#0a0a0f; --panel2:#16161f; --border:#2a2a3a;
    --amber:#ffb300; --red:#ff3030; --green:#00e676;
    --orange:#ff6d00; --white:#e0e8ff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--white);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;overflow-x:hidden}
  header{text-align:center;margin-bottom:24px}
  header h1{font-family:'Orbitron',monospace;font-size:clamp(1.4rem,4vw,2.2rem);font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);text-shadow:0 0 24px #ffb30066,0 0 6px #ffb300aa}
  header p{font-size:1rem;color:#8888aa;margin-top:4px;letter-spacing:.06em}
  .dashboard{background:radial-gradient(ellipse at 50% 30%,#1c1c2e 0%,#0d0d15 70%);border:2px solid var(--border);border-radius:24px;padding:28px 32px 24px;width:100%;max-width:720px;box-shadow:0 0 0 1px #ffffff08 inset,0 8px 60px #00000099;position:relative;overflow:hidden}
  .dashboard::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,#ffffff04 3px,#ffffff04 4px);pointer-events:none}
  .icons-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:14px;margin-bottom:8px}
  .icon-card{background:#0c0c16;border:1.5px solid #252535;border-radius:14px;padding:16px 8px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;transition:border-color .2s,box-shadow .2s;position:relative}
  .icon-card.highlight{border-color:var(--c,#ffb300);box-shadow:0 0 18px var(--c,#ffb300),0 0 6px var(--c,#ffb300) inset;animation:pulse-icon 1.6s ease-in-out infinite}
  @keyframes pulse-icon{0%,100%{box-shadow:0 0 10px var(--c),0 0 4px var(--c) inset}50%{box-shadow:0 0 28px var(--c),0 0 10px var(--c) inset}}
  .icon-svg{width:64px;height:64px;display:flex;align-items:center;justify-content:center}
  .icon-svg svg{width:100%;height:100%}
  .icon-label{font-family:'Orbitron',monospace;font-size:.45rem;letter-spacing:.08em;color:#55556a;text-align:center;text-transform:uppercase}
  .icon-card.highlight .icon-label{color:var(--c)}
  .quiz-box{width:100%;max-width:720px;margin-top:24px}
  .question-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .q-number{font-family:'Orbitron',monospace;font-size:.75rem;color:#55556a;letter-spacing:.1em}
  .progress-bar{height:4px;background:#1e1e2e;border-radius:2px;flex:1;margin:0 14px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--orange));border-radius:2px;transition:width .5s ease;box-shadow:0 0 8px var(--amber)}
  .score-display{font-family:'Orbitron',monospace;font-size:.75rem;color:var(--amber);letter-spacing:.08em}
  .question-card{background:var(--panel2);border:1.5px solid var(--border);border-radius:18px;padding:28px 28px 24px;box-shadow:0 4px 30px #00000060}
  .question-text{font-size:clamp(1rem,2.5vw,1.25rem);font-weight:600;color:var(--white);margin-bottom:22px;line-height:1.5;letter-spacing:.03em}
  .options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:480px){.options{grid-template-columns:1fr}.icons-grid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr))}}
  .option-btn{background:#0e0e1a;border:1.5px solid #252535;border-radius:12px;padding:14px 16px;color:var(--white);font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;text-align:left;cursor:pointer;transition:all .18s;letter-spacing:.03em;display:flex;align-items:center;gap:10px}
  .option-btn:hover:not(:disabled){border-color:var(--amber);color:var(--amber);background:#1a1600;box-shadow:0 0 12px #ffb30033}
  .option-btn.correct{border-color:var(--green);background:#001a08;color:var(--green);box-shadow:0 0 16px #00e67633}
  .option-btn.wrong{border-color:var(--red);background:#1a0000;color:var(--red);box-shadow:0 0 16px #ff303033}
  .option-btn:disabled{cursor:default}
  .opt-letter{font-family:'Orbitron',monospace;font-size:.7rem;width:24px;height:24px;border-radius:50%;border:1px solid currentColor;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.7}
  .feedback{margin-top:16px;padding:14px 18px;border-radius:12px;font-size:.97rem;font-weight:600;letter-spacing:.02em;line-height:1.5;display:none}
  .feedback.show{display:block}
  .feedback.ok{background:#001a0a;border:1px solid var(--green);color:var(--green)}
  .feedback.fail{background:#1a0000;border:1px solid var(--red);color:#ff8080}
  .next-btn{margin-top:18px;width:100%;padding:14px;background:linear-gradient(135deg,#1a1100,#2a1e00);border:1.5px solid var(--amber);border-radius:12px;color:var(--amber);font-family:'Orbitron',monospace;font-size:.85rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;display:none;transition:all .2s;box-shadow:0 0 14px #ffb30022}
  .next-btn:hover{background:linear-gradient(135deg,#2a1e00,#3a2c00);box-shadow:0 0 28px #ffb30055}
  .next-btn.show{display:block}
  .result-screen{text-align:center;padding:40px 20px;display:none}
  .result-screen.show{display:block}
  .result-emoji{font-size:4rem;margin-bottom:16px}
  .result-title{font-family:'Orbitron',monospace;font-size:clamp(1.4rem,4vw,2rem);font-weight:900;margin-bottom:8px}
  .result-score{font-family:'Orbitron',monospace;font-size:clamp(2.5rem,8vw,4rem);font-weight:900;color:var(--amber);text-shadow:0 0 30px var(--amber);margin:12px 0}
  .result-msg{font-size:1.1rem;color:#8888aa;max-width:400px;margin:0 auto 28px;line-height:1.6}
  .restart-btn{padding:16px 40px;background:linear-gradient(135deg,#1a1100,#2a1e00);border:2px solid var(--amber);border-radius:14px;color:var(--amber);font-family:'Orbitron',monospace;font-size:.9rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:all .2s}
  .restart-btn:hover{box-shadow:0 0 30px #ffb30066;transform:scale(1.03)}
  body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,#00000018 2px,#00000018 3px);pointer-events:none;z-index:999}
</style>
</head>
<body>
<header>
  <h1>⚠ Quiz do Painel</h1>
  <p>Você sabe o que cada luz significa?</p>
</header>
<div class="dashboard">
  <div class="icons-grid" id="iconsGrid"></div>
</div>
<div class="quiz-box">
  <div id="quizArea">
    <div class="question-header">
      <span class="q-number" id="qNumber">PERGUNTA 1/10</span>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span class="score-display" id="scoreDisplay">0 pts</span>
    </div>
    <div class="question-card">
      <div class="question-text" id="questionText">Carregando...</div>
      <div class="options" id="optionsArea"></div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">PRÓXIMA →</button>
    </div>
  </div>
  <div class="result-screen" id="resultScreen">
    <div class="result-emoji" id="resultEmoji">🏁</div>
    <div class="result-title" id="resultTitle">Resultado</div>
    <div class="result-score" id="resultScoreVal"></div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="restart-btn" onclick="restartQuiz()">↺ JOGAR NOVAMENTE</button>
  </div>
</div>

<script>

const QUESTIONS = [

  { iconId:'temp', question:'O termômetro do motor está na zona vermelha. O que fazer?', options:['Ligar o aquecedor para ajudar a resfriar','Acelerar para circular o ar no motor','Parar, desligar e deixar esfriar naturalmente','Trocar para neutro e deixar em marcha lenta'], correct:2, explanation:'Motor superaquecido = emergência. Pare em segurança e desligue. NUNCA abra o radiador quente — pressão alta causa queimaduras graves.' },
  { iconId:'fuel', question:'A luz de combustível piscou. Quantos km você ainda tem, em média?', options:['Entre 5 e 10 km','Entre 30 e 80 km (varia por modelo)','O carro para imediatamente','Mais de 200 km com segurança'], correct:1, explanation:'A reserva geralmente é de 30–80 km, variando por modelo. Abasteça logo para não danificar a bomba de combustível, que se resfria com o próprio combustível.' },
  { iconId:'seatbelt', question:'A luz de cinto continua acesa após colocar o seu. O que aconteceu?', options:['Sensor do banco do passageiro detectou peso sem cinto','O airbag está com defeito','É uma luz decorativa sem função','O ABS está desativado'], correct:0, explanation:'O sensor detectou peso no banco do passageiro (bolsa, caixa) sem cinto colocado. Remova o objeto ou coloque o cinto no banco para desligar o aviso.' },
  { iconId:'abs', question:'A luz do ABS acendeu. O que isso significa para a frenagem?', options:['Os freios param de funcionar completamente','Frenagem normal mantida, mas sem anti-bloqueio','O carro vai frear sozinho em emergências','O freio de mão está puxado'], correct:1, explanation:'Com ABS desativado, os freios convencionais ainda funcionam. Mas em freada brusca as rodas podem travar e o carro derrapar. Vá à oficina verificar.' },
  { iconId:'engine', question:'A luz "check engine" acendeu. O que ela indica?', options:['O motor está pegando fogo — saia imediatamente','Apenas aviso de revisão programada','Uma falha detectada pelo sistema OBD do motor','O filtro de ar está entupido'], correct:2, explanation:'O sistema OBD detectou uma falha — pode ser simples (tampa do combustível) ou grave (catalisador). É necessário ler o código com scanner para diagnosticar.' },
  { iconId:'tpms', question:'A luz do TPMS acende. Qual a ação correta?', options:['Furar o pneu para igualar a pressão','Verificar a pressão de todos os pneus logo','Acelerar para equalizar a pressão pelo atrito','É aviso estético — sem urgência real'], correct:1, explanation:'TPMS indica pneu com pressão abaixo do ideal. Pneu murcho aumenta consumo, prejudica a dirigibilidade e pode causar acidentes. Calibre na próxima parada segura.' },
  { iconId:'brake', question:'A luz vermelha de freio com "!" acendeu. O que NÃO é uma causa possível?', options:['Freio de mão puxado','Nível de fluido de freio baixo','Falha grave no sistema de freios','Porta traseira aberta'], correct:3, explanation:'A luz de freio pode indicar freio de mão acionado, fluido baixo ou falha grave. Porta aberta tem ícone próprio. Se não for o freio de mão, pare e verifique urgente!' },
  { iconId:'airbag', question:'A luz do airbag/SRS está acesa. O que representa em caso de acidente?', options:['O airbag vai disparar ao menor impacto','O airbag pode NÃO disparar quando necessário','Está em modo de alta sensibilidade','É só aviso de manutenção sem consequências'], correct:1, explanation:'Com a luz do airbag acesa, o sistema SRS está com falha. O airbag pode NÃO disparar em um acidente real, deixando você sem essa proteção. Vá à oficina urgente.' },
];

// ═══ ESTADO ═══
let currentQ=0, score=0, answered=false;
const shuffled=[...QUESTIONS].sort(()=>Math.random()-.5);

function renderDashboard(highlightId=null){
  const grid=document.getElementById('iconsGrid');
  grid.innerHTML='';
  ICONS.forEach(icon=>{
    const card=document.createElement('div');
    card.className='icon-card'+(highlightId===icon.id?' highlight':'');
    card.style.setProperty('--c',icon.color);
    const col=highlightId===icon.id?icon.color:'#3a3a55';
    card.innerHTML=`<div class="icon-svg" style="color:${col}">${icon.svg}</div><div class="icon-label">${icon.label}</div>`;
    grid.appendChild(card);
  });
}

function renderQuestion(){
  answered=false;
  const q=shuffled[currentQ], total=shuffled.length;
  document.getElementById('qNumber').textContent=`PERGUNTA ${currentQ+1}/${total}`;
  document.getElementById('progressFill').style.width=`${(currentQ/total)*100}%`;
  document.getElementById('scoreDisplay').textContent=`${score} pts`;
  document.getElementById('questionText').textContent=q.question;
  renderDashboard(q.iconId);
  const opts=document.getElementById('optionsArea');
  opts.innerHTML='';
  ['A','B','C','D'].forEach((ltr,i)=>{
    const btn=document.createElement('button');
    btn.className='option-btn';
    btn.innerHTML=`<span class="opt-letter">${ltr}</span>${q.options[i]}`;
    btn.onclick=()=>selectAnswer(i,btn);
    opts.appendChild(btn);
  });
  document.getElementById('feedback').className='feedback';
  document.getElementById('nextBtn').className='next-btn';
}

function selectAnswer(index,btn){
  if(answered)return;
  answered=true;
  const q=shuffled[currentQ];
  const allBtns=document.querySelectorAll('.option-btn');
  allBtns.forEach(b=>b.disabled=true);
  const fb=document.getElementById('feedback');
  if(index===q.correct){
    score++;
    btn.classList.add('correct');
    fb.className='feedback ok show';
    fb.textContent='✓ Correto! — '+q.explanation;
    document.getElementById('scoreDisplay').textContent=`${score} pts`;
  } else {
    btn.classList.add('wrong');
    allBtns[q.correct].classList.add('correct');
    fb.className='feedback fail show';
    fb.textContent='✗ Errado! — '+q.explanation;
  }
  document.getElementById('nextBtn').className='next-btn show';
}

function nextQuestion(){
  currentQ++;
  if(currentQ>=shuffled.length)showResult();
  else renderQuestion();
}

function showResult(){
  document.getElementById('quizArea').style.display='none';
  document.getElementById('resultScreen').className='result-screen show';
  const total=shuffled.length, pct=Math.round((score/total)*100);
  document.getElementById('resultScoreVal').textContent=`${score}/${total}`;
  let emoji,title,msg,cor;
  if(pct>=90){emoji='🏆';title='Especialista do Painel!';msg='Impressionante! Você conhece as luzes do seu carro como ninguém.';cor='#ffb300';}
  else if(pct>=70){emoji='👨‍🔧';title='Bom Motorista!';msg='Boa pontuação! Revise os erros para ficar mais seguro.';cor='#00e676';}
  else if(pct>=50){emoji='⚠️';title='Atenção Necessária!';msg='Conhecimento médio. Algumas luzes importantes passaram batido.';cor='#ff6d00';}
  else{emoji='🚨';title='Zona de Perigo!';msg='Fique atento ao painel — as luzes existem para te proteger!';cor='#ff3030';}
  document.getElementById('resultEmoji').textContent=emoji;
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultTitle').style.color=cor;
  document.getElementById('resultMsg').textContent=msg;
  renderDashboard(null);
}

function restartQuiz(){
  currentQ=0;score=0;
  shuffled.sort(()=>Math.random()-.5);
  document.getElementById('quizArea').style.display='block';
  document.getElementById('resultScreen').className='result-screen';
  renderQuestion();
}

renderDashboard();
renderQuestion();
</script>
