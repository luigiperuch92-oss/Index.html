<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Quiz Automotivo - Index</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#080808;
  font-family:'Rajdhani',sans-serif;
  color:#ccc;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:16px;
  background-image:radial-gradient(ellipse at 50% 0%,#1a1205 0%,#080808 55%);
}

/* ===== HEADER ===== */
.header{
  font-family:'Orbitron',monospace;
  font-size:clamp(10px,2vw,15px);
  letter-spacing:5px;
  color:#c8860a;
  text-align:center;
  margin-bottom:12px;
  text-shadow:0 0 12px #c8860a88;
  text-transform:uppercase;
}

/* ===== DASHBOARD SHELL ===== */
.dash-shell{
  width:100%;
  max-width:900px;
  background:radial-gradient(ellipse at 50% 40%,#111108 0%,#050505 100%);
  border:2px solid #2a2000;
  border-radius:28px 28px 40px 40px;
  padding:18px 24px 22px;
  box-shadow: 0 0 0 1px #3a2a00, 0 0 40px #00000099, inset 0 2px 0 #ffffff08;
  position:relative;
  margin-bottom:18px;
}

.dash-interior{
  display:flex;
  align-items:center;
  gap:12px;
  justify-content: space-between;
}

.speedo{
  width:clamp(100px,20vw,155px);
  height:clamp(100px,20vw,155px);
  flex-shrink:0;
}
.speedo svg{width:100%;height:100%;}

/* ===== LIGHTS PANEL CENTER ===== */
.lights-panel{
  flex:1;
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:8px;
  padding: 10px;
}

.light-btn{
  aspect-ratio: 1/1;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:8px;
  border:1px solid #1a1a1a;
  background:#0a0a0a;
  cursor:pointer;
  transition:all 0.25s;
}

.light-btn svg{
  width:65%; height:65%;
  opacity:0.2;
  filter:grayscale(1);
}

/* ESTADOS DAS LUZES */
.light-btn.active svg{ opacity:1; filter:none; animation: lightblink 1.4s infinite; }
.light-btn.done svg { opacity:0.4; filter:none; animation: none; }

.c-red.active { border-color:#ff3030; box-shadow:0 0 15px #ff303044; background:#150000; }
.c-amber.active { border-color:#ffb300; box-shadow:0 0 15px #ffb30044; background:#120d00; }
.c-blue.active { border-color:#00bfff; box-shadow:0 0 15px #00bfff44; background:#000d14; }

.c-red svg { fill: #ff3030; }
.c-amber svg { fill: #ffb300; }
.c-blue svg { fill: #00bfff; }

@keyframes lightblink{0%,100%{opacity:1}50%{opacity:0.4}}

/* ===== QUIZ CARD ===== */
.quiz-card{
  width:100%;
  max-width:900px;
  background:#0c0c10;
  border:1px solid #222230;
  border-radius:16px;
  padding:24px;
  text-align:center;
  min-height: 180px;
}

.q-name{ font-family:'Orbitron',sans-serif; color: #fff; font-size: 1.5rem; margin-bottom: 10px;}
.q-desc{ color: #99a; font-size: 1.1rem; margin-bottom: 20px;}

.btn-next {
  background: #c8860a;
  color: #000;
  border: none;
  padding: 10px 25px;
  font-family: 'Orbitron';
  font-weight: bold;
  cursor: pointer;
  border-radius: 5px;
  display: none;
}

.score-board { margin-top: 10px; font-family: 'Orbitron'; color: #555; font-size: 0.8rem; }
</style>
</head>
<body>

<div class="header">⬡ Sistema de Diagnóstico — Quiz de Painel ⬡</div>

<div class="dash-shell">
  <div class="dash-interior">
    <div class="speedo">
      <svg viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="75" fill="#050505" stroke="#222" stroke-width="2"/>
        <path d="M 30 120 A 60 60 0 1 1 130 120" fill="none" stroke="#1a1a1a" stroke-width="8"/>
        <text x="80" y="90" fill="#333" font-size="10" text-anchor="middle">RPM x1000</text>
        <line x1="80" y1="80" x2="80" y2="30" stroke="#c8860a" stroke-width="3" transform="rotate(-110 80 80)"/>
      </svg>
    </div>

    <div class="lights-panel" id="grid"></div>

    <div class="speedo">
      <svg viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="75" fill="#050505" stroke="#222" stroke-width="2"/>
        <path d="M 30 120 A 60 60 0 1 1 130 120" fill="none" stroke="#1a1a1a" stroke-width="8"/>
        <text x="80" y="90" fill="#333" font-size="10" text-anchor="middle">KM/H</text>
        <line x1="80" y1="80" x2="80" y2="30" stroke="#c8860a" stroke-width="3" transform="rotate(-40 80 80)"/>
      </svg>
    </div>
  </div>
</div>

<div class="quiz-card">
    <div id="question-box">
        <div class="q-name" id="q-title">Carregando...</div>
        <div class="q-desc" id="q-text">Selecione a luz correspondente no painel acima.</div>
    </div>
    <button class="btn-next" id="next-btn" onclick="nextQuestion()">PRÓXIMO DESAFIO</button>
    <div class="score-board">PONTOS: <span id="score">0</span></div>
</div>

<script>
const ICONS = {
  engine: `<svg viewBox="0 0 24 24"><path d="M7 4v2H5v2H3v8h2v2h2v2h2v-2h4v2h2v-2h2v-2h2V8h-2V6h-2V4h-2v2h-4V4zm0 4h10v6H7z"/></svg>`,
  oil: `<svg viewBox="0 0 24 24"><path d="M12 2C9.5 2 7 4.5 7 9c0 2.5 1 4.5 2.5 6L12 22l2.5-7C16 13.5 17 11.5 17 9c0-4.5-2.5-7-5-7z"/></svg>`,
  battery: `<svg viewBox="0 0 24 24"><rect x="2" y="7" width="18" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M20 11h2v3h-2zM7 4v3M11 4v3"/></svg>`,
  abs: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><text x="12" y="15.5" text-anchor="middle" font-size="7" font-weight="bold">ABS</text></svg>`,
  temp: `<svg viewBox="0 0 24 24"><path d="M13 3H11V13.27A4 4 0 0 0 8 17a4 4 0 0 0 8 0 4 4 0 0 0-3-3.87z"/></svg>`,
  brake: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><text x="12" y="16" text-anchor="middle" font-size="10" font-weight="bold">!</text></svg>`,
  fuel: `<svg viewBox="0 0 24 24"><path d="M18 8h3V6h-3V4h-2v16h2v-8h3V8h-3zM4 4h10v16H4z"/></svg>`,
  highbeam: `<svg viewBox="0 0 24 24"><path d="M2 12h5M3 7h4M3 17h4M10 7c-3 0-3 10 0 10h8V7h-8z"/></svg>`
};

const DATA = [
  { id: 'engine', name: 'Injeção Eletrônica', color: 'c-amber', desc: 'Indica falha no sistema de gerenciamento do motor. Pode afetar o consumo e desempenho.' },
  { id: 'oil', name: 'Pressão do Óleo', color: 'c-red', desc: 'CRÍTICO! Pare o carro imediatamente. Indica falta de lubrificação no motor.' },
  { id: 'battery', name: 'Sistema de Carga', color: 'c-red', desc: 'A bateria não está sendo carregada pelo alternador. O carro pode apagar em breve.' },
  { id: 'abs', name: 'Sistema ABS', color: 'c-amber', desc: 'O sistema antibloqueio falhou. Os freios funcionam, mas as rodas podem travar em emergências.' },
  { id: 'temp', name: 'Temperatura', color: 'c-red', desc: 'Superaquecimento! O líquido de arrefecimento atingiu níveis perigosos.' },
  { id: 'brake', name: 'Freio / Estacionamento', color: 'c-red', desc: 'Freio de mão puxado ou baixo nível de fluido de freio.' },
  { id: 'fuel', name: 'Reserva de Combustível', color: 'c-amber', desc: 'Nível baixo de combustível. Procure um posto em breve.' },
  { id: 'highbeam', name: 'Farol Alto', color: 'c-blue', desc: 'Indica que os faróis altos estão ligados. Cuidado para não ofuscar outros motoristas.' }
];

let currentQuestion = 0;
let score = 0;
let answered = false;

function init() {
    const grid = document.getElementById('grid');
    DATA.forEach(item => {
        const btn = document.createElement('div');
        btn.className = `light-btn ${item.color}`;
        btn.id = `btn-${item.id}`;
        btn.innerHTML = ICONS[item.id];
        btn.onclick = () => checkAnswer(item.id);
        grid.appendChild(btn);
    });
    updateQuestion();
}

function updateQuestion() {
    answered = false;
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('q-title').innerText = DATA[currentQuestion].name;
    document.getElementById('q-text').innerText = "Qual luz no painel representa este sistema?";
    
    // Resetar estilos de erro/acerto visual se necessário
}

function checkAnswer(id) {
    if(answered) return;

    if(id === DATA[currentQuestion].id) {
        score += 10;
        document.getElementById('score').innerText = score;
        document.getElementById(`btn-${id}`).classList.add('active');
        document.getElementById('q-text').innerHTML = `<span style="color:#00e676">CORRETO!</span><br>${DATA[currentQuestion].desc}`;
        answered = true;
        document.getElementById('next-btn').style.display = 'inline-block';
    } else {
        document.getElementById('q-text').innerHTML = `<span style="color:#ff3030">TENTE NOVAMENTE!</span> Esta não é a luz correta.`;
    }
}

function nextQuestion() {
    // Marcar a anterior como concluída (faded)
    document.getElementById(`btn-${DATA[currentQuestion].id}`).classList.replace('active', 'done');
    
    currentQuestion++;
    if(currentQuestion < DATA.length) {
        updateQuestion();
    } else {
        document.getElementById('question-box').innerHTML = `<div class="q-name">Diagnóstico Concluído!</div><div class="q-desc">Você completou o quiz com ${score} pontos.</div>`;
        document.getElementById('next-btn').innerText = "REINICIAR";
        document.getElementById('next-btn').onclick = () => location.reload();
        document.getElementById('next-btn').style.display = 'inline-block';
    }
}

init();
</script>
</body>
</html>
