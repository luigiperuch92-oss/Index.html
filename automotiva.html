<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador - Luzes Reais (CSS Sprite)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;outline:none;}
body{
  background:#020202; font-family:'Rajdhani',sans-serif; color:#eee;
  min-height:100vh; display:flex; flex-direction:column; align-items:center;
  padding:20px;
}

.header{
  font-family:'Orbitron',monospace; font-size:14px; letter-spacing:4px;
  color:#c8860a; margin-bottom:20px;
}

.lights-panel{
  display:flex; flex-wrap:wrap; gap:10px; max-width: 800px; justify-content:center;
  background: #111; padding: 20px; border-radius: 10px; border: 1px solid #333;
}

.light-btn{
  width: 50px; height: 50px;
  background: #000; border: 1px solid #222; border-radius: 8px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition: 0.3s;
}

/* ===== TÉCNICA CSS SPRITE ===== */
.icon-real {
  width: 35px; /* Tamanho da "janela" do recorte */
  height: 35px;
  /* ATENÇÃO: O nome da imagem deve ser exatamente o arquivo que você tem na pasta */
  background-image: url('Captura de tela 2026-05-15 091926.jpg'); 
  background-size: 800px; /* Ajuste isso se a sua imagem original for muito grande ou pequena */
  background-repeat: no-repeat;
  
  /* Deixa a luz "apagada" por padrão */
  filter: brightness(0.15) grayscale(1); 
  transition: all 0.2s ease-in-out;
}

/* Quando o botão ganha a classe .active, a luz "acende" */
.light-btn.active .icon-real {
  filter: brightness(1.2) grayscale(0) drop-shadow(0 0 8px rgba(255,255,255,0.4));
}

/* Mapeamento de Coordenadas (X, Y)
  Você altera esses valores de px para mover a imagem e centralizar o ícone certo.
  X negativo move a imagem para a esquerda. Y negativo move para cima.
*/
.ico-1  { background-position: -20px -20px; }   /* Ex: Farol neblina (1) */
.ico-2  { background-position: -70px -20px; }   /* Ex: Direção (2) */
.ico-4  { background-position: -170px -20px; }  /* Ex: Esguicho (4) */
.ico-21 { background-position: -200px -80px; }  /* Ex: TPMS (21) */
.ico-57 { background-position: -120px -250px; } /* Ex: Óleo (57) */
.ico-62 { background-position: -700px -250px; } /* Ex: Motor (62) */

/* Cartão do quiz e botões */
.quiz-card{
  margin-top:20px; width:100%; max-width:800px; background: #0a0a0a;
  border:1px solid #222; border-radius:10px; padding:20px; text-align:center;
}
.q-name{ font-family:'Orbitron'; font-size:24px; color:#fff; margin-bottom:10px; }
.q-desc{ color:#aaa; font-size:16px; }
.btn{ 
  margin-top:15px; padding:10px 20px; font-family:'Orbitron'; 
  background:#c8860a; color:#000; border:none; cursor:pointer; font-weight:bold;
}
</style>
</head>
<body>

<div class="header">SISTEMA COM LUZES REAIS (SPRITE MAPPING)</div>

<div class="lights-panel" id="panel">
  <div class="light-btn" onclick="activate(this, 'Farol de Neblina', 'Luz de neblina dianteira acesa.')"><div class="icon-real ico-1"></div></div>
  <div class="light-btn" onclick="activate(this, 'Direção Elétrica', 'Falha no sistema de direção assistida.')"><div class="icon-real ico-2"></div></div>
  <div class="light-btn" onclick="activate(this, 'Água do Para-brisa', 'Nível baixo no reservatório de esguicho.')"><div class="icon-real ico-4"></div></div>
  <div class="light-btn" onclick="activate(this, 'TPMS (Pneu)', 'Pressão baixa detectada em algum pneu.')"><div class="icon-real ico-21"></div></div>
  <div class="light-btn" onclick="activate(this, 'Pressão de Óleo', 'Pare o carro! Falta de lubrificação no motor.')"><div class="icon-real ico-57"></div></div>
  <div class="light-btn" onclick="activate(this, 'Check Engine', 'Anomalia no motor ou sistema de injeção.')"><div class="icon-real ico-62"></div></div>
</div>

<div class="quiz-card">
  <div class="q-name" id="nomeLuz">CLIQUE EM UMA LUZ ACIMA</div>
  <div class="q-desc" id="descLuz">O diagnóstico aparecerá aqui.</div>
</div>

<script>
function activate(btnElement, nome, desc) {
  // Apaga todas as luzes
  document.querySelectorAll('.light-btn').forEach(b => b.classList.remove('active'));
  
  // Acende a luz clicada (o CSS cuida de remover os filtros cinza/escuros)
  btnElement.classList.add('active');
  
  // Atualiza o painel de texto
  document.getElementById('nomeLuz').innerText = nome;
  document.getElementById('descLuz').innerText = desc;
}
</script>

</body>
</html>
