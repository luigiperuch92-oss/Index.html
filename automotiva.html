<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Diagnóstico Automotivo Premium</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;outline:none;}

body{
  background:#020202;
  font-family:'Rajdhani',sans-serif;
  color:#eee;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:16px;
  background-image:radial-gradient(ellipse at 50% -20%,#2a1f0a 0%,#020202 70%);
}

/* ===== HEADER ===== */
.header{
  font-family:'Orbitron',monospace;
  font-size:clamp(10px,1.5vw,13px);
  letter-spacing:6px;
  color:#c8860a;
  text-align:center;
  margin-bottom:20px;
  text-shadow:0 0 15px #c8860a;
  text-transform:uppercase;
  opacity:0.8;
}

/* ===== DASHBOARD SHELL ===== */
.dash-shell{
  width:100%;
  max-width:960px;
  background:
    linear-gradient(180deg, rgba(20,20,20,1) 0%, rgba(10,10,10,1) 50%, rgba(5,5,5,1) 100%),
    radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
  border:1px solid #222;
  border-radius:30px 30px 50px 50px;
  padding:25px 30px;
  box-shadow:
    0 20px 50px -10px rgba(0,0,0,0.8),
    inset 0 2px 3px rgba(255,255,255,0.03),
    inset 0 -5px 15px rgba(0,0,0,0.5);
  position:relative;
  margin-bottom:20px;
}

.dash-shell::before{
  content:'';
  position:absolute;
  top:0;left:50px;right:50px;height:1px;
  background:linear-gradient(90deg,transparent,#c8860a66,transparent);
}

.dash-interior{
  display:flex;
  align-items:center;
  gap:15px;
}

/* ===== VELOCÍMETROS ===== */
.speedo{
  width:clamp(110px,22vw,170px);
  height:clamp(110px,22vw,170px);
  flex-shrink:0;
  position:relative;
  filter: drop-shadow(0 0 10px rgba(200,134,10,0.1));
}

.speedo svg{width:100%;height:100%;}
line.needle { stroke-linecap: round; filter: drop-shadow(0px 3px 2px rgba(0,0,0,0.6)); }

/* ===== LIGHTS PANEL ===== */
.lights-panel{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:9px;
  padding: 10px;
  background: rgba(0,0,0,0.3);
  border-radius: 15px;
  box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
}

.lights-row{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  justify-content:center;
}

/* ===== BOTÕES DE LUZ (AGORA COM FONTES VETORIAIS) ===== */
.light-btn{
  width:clamp(38px,6.5vw,52px);
  height:clamp(38px,6.5vw,52px);
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:8px;
  border:1px solid #111;
  background: linear-gradient(145deg, #0a0a0a, #111);
  cursor:pointer;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  position:relative;
  flex-shrink:0;
  overflow: hidden;
  color: rgba(255,255,255,0.05); /* Desligado */
  font-size: clamp(18px, 3.5vw, 22px);
}

.light-btn .icon-wrap {
  position: relative;
  z-index: 2;
  transition: all 0.3s;
}

.light-btn::after {
  content: ''; position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  box-shadow: inset 0 2px 5px rgba(0,0,0,0.7), inset 0 -1px 2px rgba(255,255,255,0.02);
  border-radius: 8px; z-index: 1;
}

/* ===== BLOOM EMISSIVO (LUZ ACESA) ===== */
.light-btn.active.c-red{
  border-color:#ff4444; background:#1a0000; color:#ff4444;
  box-shadow: 0 0 5px rgba(255,68,68,0.5), inset 0 0 10px rgba(255,68,68,0.2);
}
.light-btn.active.c-red .icon-wrap { filter: drop-shadow(0 0 8px #ff4444); }

.light-btn.active.c-amber{
  border-color:#ffcc00; background:#2a2000; color:#ffcc00;
  box-shadow: 0 0 5px rgba(255,204,0,0.5), inset 0 0 10px rgba(255,204,0,0.2);
}
.light-btn.active.c-amber .icon-wrap { filter: drop-shadow(0 0 8px #ffcc00); }

.light-btn.active.c-green{
  border-color:#00ff88; background:#001a0d; color:#00ff88;
  box-shadow: 0 0 5px rgba(0,255,136,0.5), inset 0 0 10px rgba(0,255,136,0.2);
}
.light-btn.active.c-green .icon-wrap { filter: drop-shadow(0 0 8px #00ff88); }

.light-btn.active.c-blue{
  border-color:#00ccff; background:#00151a; color:#00ccff;
  box-shadow: 0 0 5px rgba(0,204,255,0.5), inset 0 0 10px rgba(0,204,255,0.2);
}
.light-btn.active.c-blue .icon-wrap { filter: drop-shadow(0 0 8px #00ccff); }

.light-btn.done { color: rgba(255,255,255,0.03); border-color:#111; background: #080808; cursor:default; box-shadow: none; }
.light-btn.done .icon-wrap { filter: none; }

@keyframes lightblink{0%,100%{opacity:1} 60%{opacity:0.6}}
.light-btn.active .icon-wrap { animation:lightblink 1.6s ease-in-out infinite; }

/* ===== PROGRESS BAR ===== */
.prog-wrap{
  width:100%; max-width:960px; height:4px; background:#0a0a0a;
  border-radius:2px; margin-bottom:15px; overflow:hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
}
.prog-fill{ height:100%; background:linear-gradient(90deg,#8a5c05,#c8860a); transition:width .5s ease; box-shadow:0 0 10px #c8860a; }

/* ===== QUIZ CARD ===== */
.quiz-card{
  width:100%; max-width:960px;
  background: linear-gradient(160deg, #0e0e12 0%, #08080a 100%);
  border:1px solid #1a1a22; border-radius:20px; padding:30px;
  min-height:210px; display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; box-shadow:0 10px 40px rgba(0,0,0,0.8); position:relative;
}

.q-phase{ font-family:'Orbitron',monospace; font-size:11px; letter-spacing:4px; margin-bottom:15px; text-transform:uppercase; font-weight:700; color:#555; }
.q-big-icon{ margin-bottom:15px; font-size:65px; display:flex; align-items:center; justify-content:center; }
.q-name{ font-family:'Orbitron',monospace; font-size:clamp(18px,4.5vw,30px); font-weight:900; letter-spacing:1px; margin-bottom:10px; color:#fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
.q-desc{ font-size:clamp(15px,2.8vw,19px); color:#aab; max-width:620px; line-height:1.6; }

.q-detail-box{ background: rgba(0, 10, 20, 0.5); border:1px solid #003355; border-radius:12px; padding:20px 25px; margin-top:20px; max-width:680px; text-align:left; box-shadow: inset 0 0 15px rgba(0,0,0,0.5); }
.q-detail-title{ font-family:'Orbitron',monospace; font-size:10px; letter-spacing:3px; color:#00ccff; margin-bottom:10px; font-weight:700; }
.q-detail-text{ font-size:15px; color:#b0c4de; line-height:1.8; }

.idle-txt{ color:#444; font-size:19px; letter-spacing:1px; animation:lightblink 2s ease-in-out infinite; }
.score{ position:absolute; top:18px; right:22px; font-family:'Orbitron',monospace; font-size:12px; color:#333; letter-spacing:2px; }

/* ===== BOTOES ===== */
.btn-row{ display:flex; gap:12px; margin-top:20px; flex-wrap:wrap; justify-content:center; }
.btn{ font-family:'Orbitron',monospace; font-size:11px; letter-spacing:2px; padding:15px 30px; border:none; border-radius:8px; cursor:pointer; text-transform:uppercase; font-weight:700; transition:all 0.2s; position:relative; overflow:hidden; }
.btn::before { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); transition: 0.5s; }
.btn:hover::before { left: 100%; }
.btn:hover{ transform:translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
.btn:active{ transform:translateY(1px); }

.btn-reveal{ background: linear-gradient(145deg, #2a1f00, #1e1600); color:#ffcc00; border:1px solid #4a3300; }
.btn-next{ background: linear-gradient(145deg, #001f2a, #001520); color:#00ccff; border:1px solid #00335a; }
.btn-restart{ background: linear-gradient(145deg, #2a0000, #1a0000); color:#ff4444; border:1px solid #660000; }

.tc-red{color:#ff4444; filter:drop-shadow(0 0 15px rgba(255,68,68,0.8));}
.tc-amber{color:#ffcc00; filter:drop-shadow(0 0 15px rgba(255,204,0,0.8));}
.tc-green{color:#00ff88; filter:drop-shadow(0 0 15px rgba(0,255,136,0.8));}
.tc-blue{color:#00ccff; filter:drop-shadow(0 0 15px rgba(0,204,255,0.8));}

@keyframes slidein{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.slidein{ animation:slidein 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
</style>
</head>
<body>

<div class="dash-shell">

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type, freq, duration, volume = 0.1) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
  osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  osc.connect(gain); gain.connect(audioCtx.destination); osc.start();
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
  osc.stop(audioCtx.currentTime + duration);
}

const LIGHTS = [

  {id:'porta', icon:'porta', color:'c-red', nome:'PORTA ABERTA', desc:'Porta ou porta-malas destravado.', det:'Pare em segurança e verifique o fechamento de todas as portas.'},
  {id:'cambio', icon:'cambio', color:'c-amber', nome:'FALHA NO CÂMBIO', desc:'Transmissão em modo de segurança.', det:'O câmbio pode travar em 3ª marcha para evitar danos catastróficos. Vá à oficina.'},
  {id:'injecao', icon:'injecao', color:'c-amber', nome:'INJEÇÃO ELETR.', desc:'Falha elétrica / injeção.', det:'Pode causar cortes na aceleração ou alto consumo. Requer diagnóstico computadorizado.'},
  {id:'suspensao', icon:'suspensao', color:'c-amber', nome:'SUSPENSÃO', desc:'Falha no ajuste eletrônico.', det:'Em carros com suspensão pneumática, indica problemas no compressor ou bolsas de ar.'},
  {id:'check', icon:'check', color:'c-amber', nome:'AVISO GERAL', desc:'Alerta genérico no computador.', det:'Leia a mensagem descritiva no painel central LCD do veículo.'}
];

let currentIdx = -1; let doneSet = new Set(); let phase = 'idle';
let shuffled = shuffle([...Array(LIGHTS.length).keys()]); let shPos = 0;

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a;}

const panel = document.getElementById('lightsPanel');
const rows = [8,8,8];
let li = 0;
rows.forEach(cnt=>{
  const row = document.createElement('div'); row.className = 'lights-row';
  for(let i=0; i<cnt && li<LIGHTS.length; i++, li++){
    const l = LIGHTS[li];
    const btn = document.createElement('div');
    btn.className = `light-btn ${l.color}`;
    btn.id = `lb-${li}`;
    btn.title = l.nome;
    // Puxando do dicionário de ícones vetoriais
    btn.innerHTML = `<div class="icon-wrap">${ICONS[l.icon]}</div>`;
    btn.addEventListener('click',()=>activate(li));
    row.appendChild(btn);
  }
  panel.appendChild(row);
});

function activate(idx){
  if(phase === 'revealed' && currentIdx !== idx && !doneSet.has(currentIdx)) return;
  playSound('sine', 600, 0.08, 0.04);
  document.querySelectorAll('.light-btn.active').forEach(b=>b.classList.remove('active'));
  const btn = document.getElementById(`lb-${idx}`);
  if(!btn) return;
  btn.classList.add('active');
  currentIdx = idx; phase = 'question'; render();
}

function nextAuto(){
  if(doneSet.size >= LIGHTS.length){ showComplete(); return; }
  if(shPos >= shuffled.length){ shPos=0; shuffled=shuffle([...Array(LIGHTS.length).keys()]); }
  let next = shuffled[shPos++]; let tries=0;
  while(doneSet.has(next) && tries<LIGHTS.length){
    if(shPos>=shuffled.length){shPos=0;shuffled=shuffle([...Array(LIGHTS.length).keys()]);}
    next=shuffled[shPos++]; tries++;
  }
  activate(next);
}

function reveal(){
  phase = 'revealed'; doneSet.add(currentIdx);
  const btn = document.getElementById(`lb-${currentIdx}`);
  btn.classList.add('done');
  playSound('triangle', 400, 0.2, 0.08); setTimeout(()=>playSound('triangle', 600, 0.3, 0.06), 120);
  render();
}

function showComplete(){
  playSound('square', 300, 0.6, 0.1);
  const card = document.getElementById('quizCard'); const btnRow = document.getElementById('btnRow');
  document.getElementById('progFill').style.width = '100%';
  card.innerHTML = `<div class="q-phase slidein" style="color:#00ff88">★ CHECK-UP COMPLETO ★</div><div class="q-name slidein" style="color:#fff">DIAGNÓSTICO FINALIZADO</div><div class="q-desc slidein">Todos os sistemas operacionais e mapeados com sucesso!</div>`;
  btnRow.innerHTML = `<button class="btn btn-restart slidein" onclick="location.reload()">Reiniciar Simulador</button>`;
}

function render(){
  const card = document.getElementById('quizCard'); const btnRow = document.getElementById('btnRow');
  const scoreTxt = document.getElementById('scoreTxt');
  if(scoreTxt) scoreTxt.innerText = `${doneSet.size} / ${LIGHTS.length}`;
  document.getElementById('progFill').style.width = `${(doneSet.size / LIGHTS.length) * 100}%`;

  const l = LIGHTS[currentIdx];
  const iconColor = l.color.replace('c-', 'tc-');

  if(phase === 'question'){
    card.innerHTML = `
      <div class="score">${doneSet.size} / ${LIGHTS.length}</div>
      <div class="q-phase slidein" style="color:#ffcc00">⚠ ALERTA ATIVO ⚠</div>
      <div class="q-big-icon ${iconColor} slidein">${ICONS[l.icon]}</div>
      <div class="q-name slidein" style="color:#fff">IDENTIFIQUE O SÍMBOLO</div>
      <div class="q-desc slidein">Tente nomear a função desta luz antes de revelar a resposta.</div>
    `;
    btnRow.innerHTML = `<button class="btn btn-reveal slidein" onclick="reveal()">Revelar Resposta</button><button class="btn btn-next slidein" onclick="nextAuto()">Pular Luz</button>`;
  }
  else if(phase === 'revealed'){
    card.innerHTML = `
      <div class="score">${doneSet.size} / ${LIGHTS.length}</div>
      <div class="q-phase slidein" style="color:#00ff88">✔ SISTEMA IDENTIFICADO</div>
      <div class="q-big-icon ${iconColor} slidein">${ICONS[l.icon]}</div>
      <div class="q-name ${iconColor} slidein">${l.nome}</div>
      <div class="q-desc slidein">${l.desc}</div>
      <div class="q-detail-box slidein"><div class="q-detail-title">AÇÃO RECOMENDADA:</div><div class="q-detail-text">${l.det}</div></div>
    `;
    btnRow.innerHTML = `<button class="btn btn-next slidein" onclick="nextAuto()">Próximo Alerta ➔</button>`;
  }
}
</script>
</body>
</html>
