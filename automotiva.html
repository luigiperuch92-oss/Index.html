<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Pro - Ultra Realism</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');

:root {
    --bg-black: #020202;
    --card-bg: rgba(15, 15, 20, 0.95);
    --led-red: #ff3131;
    --led-amber: #ff9d00;
    --led-green: #22ff88;
    --led-blue: #22ccff;
    --border-glass: rgba(255, 255, 255, 0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

body {
    background: var(--bg-black);
    background-image: radial-gradient(circle at 50% 50%, #1a1a24 0%, #000 80%);
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* PAINEL PRINCIPAL */
.dashboard-container {
    width: 950px;
    padding: 30px;
    background: var(--card-bg);
    border: 1px solid var(--border-glass);
    border-radius: 35px;
    box-shadow: 0 50px 100px rgba(0,0,0,0.9), inset 0 0 40px rgba(255,255,255,0.02);
    display: grid;
    grid-template-columns: 220px 1fr 220px;
    gap: 20px;
    position: relative;
}

/* DISPLAY CENTRAL */
.center-hud {
    grid-column: 2;
    background: #000;
    border: 2px solid #111;
    border-radius: 20px;
    height: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: inset 0 0 30px rgba(0,0,0,1);
    border: 1px solid rgba(255,157,0,0.2);
}

.scanline {
    position: absolute; width: 100%; height: 100%;
    background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.3) 50%);
    background-size: 100% 4px; pointer-events: none; opacity: 0.2;
}

.hud-title { font-family: 'Orbitron'; font-size: 12px; color: #555; letter-spacing: 3px; margin-bottom: 20px; }
.hud-main-text { font-family: 'Orbitron'; font-size: 28px; color: var(--led-amber); text-shadow: 0 0 15px var(--led-amber); text-align: center; }

/* SLOTS DE LUZES */
.side-panel {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.light-box {
    aspect-ratio: 1;
    background: linear-gradient(145deg, #111, #080808);
    border: 1px solid #1a1a1a;
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
    position: relative;
    padding: 10px;
}

.light-box svg {
    width: 35px;
    height: 35px;
    fill: rgba(255,255,255,0.05); /* Desligado */
    transition: 0.3s;
}

.light-label {
    font-size: 9px;
    color: #444;
    margin-top: 8px;
    text-transform: uppercase;
    font-weight: bold;
    text-align: center;
}

/* EFEITOS DE ATIVAÇÃO (GLOW REAL) */
.active.c-red svg { fill: var(--led-red); filter: drop-shadow(0 0 8px var(--led-red)); }
.active.c-amber svg { fill: var(--led-amber); filter: drop-shadow(0 0 8px var(--led-amber)); }
.active.c-green svg { fill: var(--led-green); filter: drop-shadow(0 0 8px var(--led-green)); }
.active.c-blue svg { fill: var(--led-blue); filter: drop-shadow(0 0 8px var(--led-blue)); }

.active .light-label { color: #eee; }

/* BOTÃO START ENGINE */
.start-btn-container {
    grid-column: 2;
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

.start-btn {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: radial-gradient(circle, #331111, #110000);
    border: 5px solid #222;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
}

.start-btn:hover { border-color: var(--led-red); }
.start-btn:active { transform: scale(0.95); }

.start-btn .text-top { font-family: 'Orbitron'; font-size: 14px; color: #fff; font-weight: 900; }
.start-btn .text-bot { font-size: 10px; color: #666; margin-top: 5px; }

.on-fire {
    box-shadow: 0 0 40px rgba(255, 49, 49, 0.4), inset 0 0 20px var(--led-red);
    border-color: var(--led-red) !important;
}

</style>
</head>
<body>

<div class="dashboard-container">
    
    <div class="side-panel">
        <div class="light-box c-amber" onclick="toggle(this, 'MOTOR', 'FALHA DE INJEÇÃO')">
            <svg viewBox="0 0 512 512"><path d="M495.9 166.6c-3.1 10.5-14.2 16.5-24.7 13.4s-16.5-14.2-13.4-24.7l12.9-43.7c3.1-10.5 14.2-16.5 24.7-13.4s16.5 14.2 13.4 24.7l-12.9 43.7zM64 352c-17.7 0-32-14.3-32-32V224c0-17.7 14.3-32 32-32H96V128c0-17.7 14.3-32 32-32h64c17.7 0 32 14.3 32 32v32h128V128c0-17.7 14.3-32 32-32h32c17.7 0 32 14.3 32 32v121.1c25.4 12.1 42.1 36.6 42.1 64.9V352c0 17.7-14.3 32-32 32H64zM160 320a32 32 0 1 0 0-64 32 32 0 1 0 0 64z"/></svg>
            <div class="light-label">Motor</div>
        </div>
        <div class="light-box c-red" onclick="toggle(this, 'ÓLEO', 'PRESSÃO DE ÓLEO CRÍTICA')">
            <svg viewBox="0 0 640 512"><path d="M128 32C92.7 32 64 60.7 64 96V312.3c-36.4 11.2-64 44.8-64 85c0 47.1 36.6 85.9 82.5 86.6L448 483.9l.4 0c1.2 0 2.4-.1 3.5-.2c56.8-5.3 101.4-51.2 104.1-108.3c.4-7.9-5.9-14.5-13.8-14.1l-102.3 5c-15.1 .7-27.1-11.4-26.4-26.5c.6-11.8 10.3-21.3 22.1-21.3H560c44.2 0 80-35.8 80-80s-35.8-80-80-80h-48V114.7c0-11-6.1-21-15.8-25.9L304.3 1.1c-13.6-6.8-29.8-1.3-36.6 12.3L208.5 112H128V32z"/></svg>
            <div class="light-label">Óleo</div>
        </div>
        <div class="light-box c-red" onclick="toggle(this, 'TEMPERATURA', 'SUPERAQUECIMENTO')">
            <svg viewBox="0 0 320 512"><path d="M160 64c-26.5 0-48 21.5-48 48V300.7c-20.3 14.9-32 38.4-32 63.3c0 44.2 35.8 80 80 80s80-35.8 80-80c0-24.9-11.7-48.4-32-63.3V112c0-26.5-21.5-48-48-48z"/></svg>
            <div class="light-label">Temp</div>
        </div>
        <div class="light-box c-amber" onclick="toggle(this, 'TPMS', 'PNEU MURCHO DETECTADO')">
            <svg viewBox="0 0 512 512">
                <path d="M128 448c-35.3 0-64-28.7-64-64v-64c0-106 86-192 192-192s192 86 192 192v64c0 35.3-28.7 64-64 64H128zm128-288c-17.7 0-32 14.3-32 32v96c0 17.7 14.3 32 32 32s32-14.3 32-32v-96c0-17.7-14.3-32-32-32zm0 192a24 24 0 1 0 0 48 24 24 0 1 0 0-48z"/>
                <path d="M448 352h32c17.7 0 32 14.3 32 32v32c0 17.7-14.3 32-32 32h-32v-96zM32 352h32v96H32c-17.7 0-32-14.3-32-32v-32c0-17.7 14.3-32 32-32z" opacity="0.3"/>
            </svg>
            <div class="light-label">Pneu</div>
        </div>
    </div>

    <div class="center-hud" id="hud">
        <div class="scanline"></div>
        <div class="hud-title">COMPUTADOR DE BORDO</div>
        <div class="hud-main-text" id="statusText">SISTEMA OFFLINE</div>
        <div style="color:#555; margin-top:10px; font-size:12px;">PRESSIONE START</div>
    </div>

    <div class="side-panel">
        <div class="light-box c-amber" onclick="toggle(this, 'DIREÇÃO', 'FALHA DIREÇÃO HIDRÁULICA')">
            <svg viewBox="0 0 512 512"><path d="M256 0C114.6 0 0 114.6 0 256s114.6 256 256 256s256-114.6 256-256S397.4 0 256 0zM256 464c-114.7 0-208-93.3-208-208S141.3 48 256 48s208 93.3 208 208s-93.3 208-208 208zM336 256c0 44.2-35.8 80-80 80s-80-35.8-80-80s35.8-80 80-80s80 35.8 80 80z"/></svg>
            <div class="light-label">Direção</div>
        </div>
        <div class="light-box c-green" onclick="toggle(this, 'NEBLINA', 'FAROL AUXILIAR ATIVO')">
            <svg viewBox="0 0 512 512"><path d="M0 192c0-17.7 14.3-32 32-32H192c17.7 0 32 14.3 32 32v128c0 17.7-14.3 32-32 32H32c-17.7 0-32-14.3-32-32V192zM352 160c-17.7 0-32 14.3-32 32s14.3 32 32 32h96c17.7 0 32-14.3 32-32s-14.3-32-32-32H352zm0 128c-17.7 0-32 14.3-32 32s14.3 32 32 32h96c17.7 0 32-14.3 32-32s-14.3-32-32-32H352z"/></svg>
            <div class="light-label">Neblina</div>
        </div>
        <div class="light-box c-red" onclick="toggle(this, 'AIRBAG', 'FALHA NO SISTEMA SRS')">
            <svg viewBox="0 0 512 512"><path d="M256 0c141.4 0 256 114.6 256 256s-114.6 256-256 256S0 397.4 0 256S114.6 0 256 0zM164.1 228.3c-10.3 0-18.1 8.9-16.8 19.1c5.1 40.2 39.3 71.3 80.7 71.3s75.6-31.1 80.7-71.3c1.3-10.2-6.5-19.1-16.8-19.1H164.1z"/></svg>
            <div class="light-label">Airbag</div>
        </div>
        <div class="light-box c-red" onclick="toggle(this, 'CINTO', 'AFIVELE OS CINTOS')">
            <svg viewBox="0 0 512 512"><path d="M256 48a208 208 0 1 1 0 416 208 208 0 1 1 0-416zm0 464A256 256 0 1 0 256 0a256 256 0 1 0 0 512zM176 256a80 80 0 1 1 160 0 80 80 0 1 1 -160 0z"/></svg>
            <div class="light-label">Cinto</div>
        </div>
    </div>

    <div class="start-btn-container">
        <button class="start-btn" id="startBtn" onclick="ignition()">
            <div class="text-top">START</div>
            <div class="text-bot">ENGINE</div>
        </button>
    </div>

</div>

<script>
    function ignition() {
        const btn = document.getElementById('startBtn');
        const status = document.getElementById('statusText');
        
        // Efeito de ligar
        btn.classList.add('on-fire');
        status.innerText = "CHECKING...";
        status.style.color = "#22ff88";
        status.style.textShadow = "0 0 20px #22ff88";

        // Acende tudo rapidinho (check)
        const boxes = document.querySelectorAll('.light-box');
        boxes.forEach(box => box.classList.add('active'));

        setTimeout(() => {
            status.innerText = "READY TO DRIVE";
            boxes.forEach(box => box.classList.remove('active'));
        }, 1500);
    }

    function toggle(el, title, desc) {
        // Alterna luz
        el.classList.toggle('active');
        
        // Atualiza HUD
        const status = document.getElementById('statusText');
        if(el.classList.contains('active')) {
            status.innerText = desc;
            status.style.color = window.getComputedStyle(el.querySelector('svg')).fill;
        } else {
            status.innerText = "SISTEMA OK";
            status.style.color = "#22ff88";
        }
    }
</script>

</body>
</html>
