<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Pro - Ultra Realism</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');

:root {
    --bg-black: #020202;
    --card-bg: rgba(15, 15, 20, 0.95);
    --led-red: #ff3131;
    --led-amber: #ff9d00;
    --led-green: #22ff88;
    --led-blue: #22ccff;
    --border-glass: rgba(255, 255, 255, 0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

body {
    background: var(--bg-black);
    background-image: radial-gradient(circle at 50% 50%, #1a1a24 0%, #000 80%);
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* PAINEL PRINCIPAL */
.dashboard-container {
    width: 950px;
    padding: 30px;
    background: var(--card-bg);
    border: 1px solid var(--border-glass);
    border-radius: 35px;
    box-shadow: 0 50px 100px rgba(0,0,0,0.9), inset 0 0 40px rgba(255,255,255,0.02);
    display: grid;
    grid-template-columns: 220px 1fr 220px;
    gap: 20px;
    position: relative;
}

/* DISPLAY CENTRAL */
.center-hud {
    grid-column: 2;
    background: #000;
    border: 2px solid #111;
    border-radius: 20px;
    height: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: inset 0 0 30px rgba(0,0,0,1);
    border: 1px solid rgba(255,157,0,0.2);
}

.scanline {
    position: absolute; width: 100%; height: 100%;
    background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.3) 50%);
    background-size: 100% 4px; pointer-events: none; opacity: 0.2;
}

.hud-title { font-family: 'Orbitron'; font-size: 12px; color: #555; letter-spacing: 3px; margin-bottom: 20px; }
.hud-main-text { font-family: 'Orbitron'; font-size: 28px; color: var(--led-amber); text-shadow: 0 0 15px var(--led-amber); text-align: center; }

/* SLOTS DE LUZES */
.side-panel {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.light-box {
    aspect-ratio: 1;
    background: linear-gradient(145deg, #111, #080808);
    border: 1px solid #1a1a1a;
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
    position: relative;
    padding: 10px;
}

.light-box svg {
    width: 40px;
    height: 40px;
    fill: rgba(255,255,255,0.05); /* Desligado */
    transition: 0.3s;
}

.light-label {
    font-size: 9px;
    color: #444;
    margin-top: 8px;
    text-transform: uppercase;
    font-weight: bold;
    text-align: center;
}

/* EFEITOS DE ATIVAÇÃO (GLOW REAL) */
.active.c-red svg { fill: var(--led-red); filter: drop-shadow(0 0 8px var(--led-red)) drop-shadow(0 0 15px var(--led-red)); }
.active.c-amber svg { fill: var(--led-amber); filter: drop-shadow(0 0 8px var(--led-amber)) drop-shadow(0 0 15px var(--led-amber)); }
.active.c-green svg { fill: var(--led-green); filter: drop-shadow(0 0 8px var(--led-green)) drop-shadow(0 0 15px var(--led-green)); }
.active.c-blue svg { fill: var(--led-blue); filter: drop-shadow(0 0 8px var(--led-blue)) drop-shadow(0 0 15px var(--led-blue)); }

.active .light-label { color: #eee; }

/* BOTÃO START ENGINE */
.start-btn-container {
    grid-column: 2;
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

.start-btn {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: radial-gradient(circle, #331111, #110000);
    border: 5px solid #222;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
}

.start-btn:hover { border-color: var(--led-red); }
.start-btn:active { transform: scale(0.95); }

.start-btn .text-top { font-family: 'Orbitron'; font-size: 14px; color: #fff; font-weight: 900; }
.start-btn .text-bot { font-size: 10px; color: #666; margin-top: 5px; }

.on-fire {
    box-shadow: 0 0 40px rgba(255, 49, 49, 0.4), inset 0 0 20px var(--led-red);
    border-color: var(--led-red) !important;
}

</style>
</head>
<body>

<div class="dashboard-container">
    
    <div class="side-panel">
        <div class="light-box c-amber" onclick="toggle(this, 'MOTOR', 'FALHA DE INJEÇÃO')">
            <svg viewBox="0 0 512 512">
                <path d="M480 192h-32l-16-48h-64l-16 48h-32V128h-64v64h-32l-16-48h-64l-16 48H32v192h96v32h256v-32h96V192zM128 320a32 32 0 1 1 32-32 32 32 0 0 1-32 32z"/>
            </svg>
            <div class="light-label">Motor</div>
        </div>
        <div class="light-box c-red" onclick="toggle(this, 'ÓLEO', 'PRESSÃO DE ÓLEO CRÍTICA')">
            <svg viewBox="0 0 512 512">
                <path d="M480 320c-32 0-64-16-96-32s-64-32-96-32-64 16-96 32-64 32-96 32V160h64l32-64h128l32 64h64v160zM64 416h384v32H64v-32zM448 96l64 64-64 64V96z"/>
            </svg>
            <div class="light-label">Óleo</div>
        </div>
        <div class="light-box c-red" onclick="toggle(this, 'TEMPERATURA', 'SUPERAQUECIMENTO')">
            <svg viewBox="0 0 512 512">
                <path d="M256 64a48 48 0 0 0-48 48v192a80 80 0 1 0 96 0V112a48 48 0 0 0-48-48zm0 288a32 32 0 1 1 32-32 32 32 0 0 1-32 32zM128 416h256v32H128z"/>
            </svg>
            <div class="light-label">Temp</div>
        </div>
        <div class="light-box c-amber" onclick="toggle(this, 'TPMS', 'PNEU MURCHO DETECTADO')">
            <svg viewBox="0 0 512 512">
                <path d="M128 448c-35 0-64-29-64-64v-64c0-106 86-192 192-192s192 86 192 192v64c0 35-29 64-64 64H128zm128-288c-18 0-32 14-32 32v96c0 18 14 32 32 32s32-14 32-32v-96c0-18-14-32-32-32zm0 192a24 24 0 1 0 0 48 24 24 0 0 0 0-48zM64 352h32v96H64zM416 352h32v96h-32z"/>
            </svg>
            <div class="light-label">Pneu</div>
        </div>
    </div>

    <div class="center-hud" id="hud">
        <div class="scanline"></div>
        <div class="hud-title">COMPUTADOR DE BORDO</div>
        <div class="hud-main-text" id="statusText">SISTEMA OFFLINE</div>
        <div style="color:#555; margin-top:10px; font-size:12px;">PRESSIONE START</div>
    </div>

    <div class="side-panel">
        <div class="light-box c-amber" onclick="toggle(this, 'DIREÇÃO', 'FALHA DIREÇÃO HIDRÁULICA')">
            <svg viewBox="0 0 512 512">
                <path d="M256 0a256 256 0 1 0 0 512 256 256 0 0 0 0-512zm0 464a208 208 0 1 1 0-416 208 208 0 0 1 0 416zm-32-256v96a32 32 0 0 0 64 0v-96a32 32 0 0 0-64 0zm0 160a32 32 0 1 0 64 0 32 32 0 0 0-64 0z"/>
                <circle cx="256" cy="256" r="64" fill="none" stroke="currentColor" stroke-width="32" opacity="0.2"/>
            </svg>
            <div class="light-label">Direção</div>
        </div>
        <div class="light-box c-green" onclick="toggle(this, 'NEBLINA', 'FAROL AUXILIAR ATIVO')">
            <svg viewBox="0 0 512 512">
                <path d="M192 128a128 128 0 0 1 0 256H32V128h160m32-32H0v320h224A160 160 0 0 0 224 96zM320 160h160v32H320zm0 96h160v32H320zm0 96h160v32H320z"/>
                <path d="M256 128l32 256" stroke="currentColor" stroke-width="20" stroke-linecap="round"/>
            </svg>
            <div class="light-label">Neblina</div>
        </div>
        <div class="light-box c-red" onclick="toggle(this, 'AIRBAG', 'FALHA NO SISTEMA SRS')">
            <svg viewBox="0 0 512 512">
                <circle cx="160" cy="160" r="48"/>
                <path d="M64 416h192v32H64zM224 256a96 96 0 1 1-192 0h192zM384 128a64 64 0 1 0 0 128 64 64 0 0 0 0-128z"/>
            </svg>
            <div class="light-label">Airbag</div>
        </div>
        <div class="light-box c-red" onclick="toggle(this, 'CINTO', 'AFIVELE OS CINTOS')">
            <svg viewBox="0 0 512 512">
                <circle cx="256" cy="128" r="48"/>
                <path d="M160 448h192v32H160zm160-256H192l-64 192h256zM128 256l256 128" stroke="currentColor" stroke-width="20"/>
            </svg>
            <div class="light-label">Cinto</div>
        </div>
    </div>

    <div class="start-btn-container">
        <button class="start-btn" id="startBtn" onclick="ignition()">
            <div class="text-top">START</div>
            <div class="text-bot">ENGINE</div>
        </button>
    </div>

</div>

<script>
    function ignition() {
        const btn = document.getElementById('startBtn');
        const status = document.getElementById('statusText');
        
        btn.classList.add('on-fire');
        status.innerText = "CHECKING...";
        status.style.color = "#22ff88";
        status.style.textShadow = "0 0 20px #22ff88";

        const boxes = document.querySelectorAll('.light-box');
        boxes.forEach(box => box.classList.add('active'));

        setTimeout(() => {
            status.innerText = "READY TO DRIVE";
            boxes.forEach(box => box.classList.remove('active'));
        }, 1500);
    }

    function toggle(el, title, desc) {
        el.classList.toggle('active');
        const status = document.getElementById('statusText');
        if(el.classList.contains('active')) {
            status.innerText = desc;
            status.style.color = window.getComputedStyle(el.querySelector('svg')).fill;
        } else {
            status.innerText = "SISTEMA OK";
            status.style.color = "#22ff88";
        }
    }
</script>

</body>
</html>
