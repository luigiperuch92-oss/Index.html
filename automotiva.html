<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Painel Automotivo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#050505;
  font-family:'Rajdhani',sans-serif;
  color:#ccc;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:12px;
  background:radial-gradient(ellipse at 50% 0%,#110800 0%,#050505 60%);
}

/* ============ SHELL DO PAINEL ============ */
.shell{
  width:100%;max-width:860px;
  background:linear-gradient(175deg,#141414 0%,#0a0a0a 100%);
  border-radius:50% 50% 30px 30px / 30px 30px 20px 20px;
  border:2px solid #1e1e1e;
  box-shadow:0 0 80px #00000099, inset 0 2px 0 #2a2a2a, inset 0 -1px 0 #111;
  padding:22px 14px 18px;
  position:relative;
  overflow:hidden;
}
.shell::before{
  content:'';position:absolute;top:0;left:10%;right:10%;height:2px;
  background:linear-gradient(90deg,transparent,#ff6600,transparent);
  opacity:0.5;
}

/* ============ LAYOUT PRINCIPAL ============ */
.dash-main{
  display:grid;
  grid-template-columns:1fr 260px 1fr;
  gap:10px;
  align-items:start;
}

/* ============ PAINÉIS LATERAIS ============ */
.side-panel{
  background:linear-gradient(160deg,#111 0%,#0c0c0c 100%);
  border-radius:16px;
  border:1px solid #1a1a1a;
  padding:10px 8px;
  display:flex;
  flex-direction:column;
  gap:6px;
  min-height:220px;
}

/* seta grande lateral */
.arrow-left, .arrow-right{
  display:flex;align-items:center;justify-content:center;
  width:100%;padding:6px 0;
}

.arrow-svg{
  width:52px;height:32px;
  opacity:0.12;
  filter:grayscale(1);
  transition:all 0.3s;
}
.arrow-svg.on{
  opacity:1;filter:none;
  filter:drop-shadow(0 0 8px #00cc44);
}

/* grade de luzes do lado */
.lights-side{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:5px;
}

/* ============ CÉLULA DE LUZ ============ */
.lc{
  width:100%;aspect-ratio:1;
  display:flex;align-items:center;justify-content:center;
  border-radius:7px;border:1px solid transparent;
  cursor:pointer;transition:all 0.25s;
}
.lc svg{
  width:72%;height:72%;
  opacity:0.1;filter:grayscale(1);
  transition:all 0.3s;
}
.lc.active svg{
  opacity:1;filter:grayscale(0) drop-shadow(0 0 5px currentColor);
  transform:scale(1.15);
}
.lc.active{border-color:currentColor;background:rgba(255,255,255,0.03);}
.lc.done svg{opacity:0.04;filter:grayscale(1);}
.lc.done{border-color:transparent;background:transparent;}

/* cores */
.cr{color:#ff2b2b;}
.ca{color:#ffaa00;}
.cg{color:#00cc44;}
.cb{color:#00aaff;}
.cw{color:#ccddff;}

/* ============ DISPLAY CENTRAL ============ */
.center-display{
  background:#000;
  border-radius:12px;
  border:2px solid #1a1a1a;
  box-shadow:inset 0 0 30px #00000099, 0 0 20px #00000066;
  padding:12px 10px;
  display:flex;flex-direction:column;
  align-items:center;gap:6px;
}

.speed-box{
  background:#050505;
  border:1px solid #111;
  border-radius:8px;
  width:100%;
  display:flex;flex-direction:column;align-items:center;
  padding:8px 6px 6px;
}

.speed-num{
  font-family:'Share Tech Mono',monospace;
  font-size:48px;
  color:#e8e8e8;
  line-height:1;
  letter-spacing:2px;
  text-shadow:0 0 20px rgba(255,255,255,0.15);
}
.speed-unit{
  font-family:'Orbitron',monospace;
  font-size:9px;letter-spacing:3px;color:#444;
  align-self:flex-end;margin-right:4px;margin-top:-4px;
}

.odo-row{
  font-family:'Share Tech Mono',monospace;
  font-size:11px;color:#555;
  letter-spacing:1px;
  width:100%;padding:0 6px;
}

/* barras combustível e temperatura */
.bars-row{
  display:flex;gap:8px;align-items:flex-end;
  width:100%;padding:0 4px;
}
.bar-group{
  display:flex;flex-direction:column;gap:2px;flex:1;
}
.bar-label{
  font-family:'Orbitron',monospace;font-size:6px;
  letter-spacing:1px;color:#333;
  display:flex;justify-content:space-between;
}
.bar-track{
  height:8px;background:#0a0a0a;
  border:1px solid #1a1a1a;border-radius:2px;
  display:flex;gap:1px;padding:1px;
}
.bar-seg{
  flex:1;border-radius:1px;
  background:#111;
}
.bar-seg.fuel-on{background:#ff8c00;}
.bar-seg.temp-on{background:#00aaff;}

/* ============ PROGRESS ============ */
.prog-wrap{
  width:100%;max-width:860px;
  height:3px;background:#111;border-radius:3px;
  margin:10px 0 12px;overflow:hidden;
}
.prog-fill{
  height:100%;
  background:linear-gradient(90deg,#cc4400,#ff8c00);
  border-radius:3px;transition:width 0.5s;
  box-shadow:0 0 8px #ff8c0066;
}

/* ============ QUIZ CARD ============ */
.quiz-card{
  width:100%;max-width:860px;
  background:linear-gradient(145deg,#0f0f14,#0a0a10);
  border:1px solid #1c1c1c;border-radius:16px;
  padding:22px 24px;min-height:160px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  box-shadow:0 8px 40px #00000088;
  position:relative;
}
.qphase{
  font-family:'Orbitron',monospace;font-size:9px;
  letter-spacing:3px;color:#ff8c00;margin-bottom:10px;
}
.qphase.blink{animation:blink 0.9s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.1}}

.q-icon{
  width:60px;height:60px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:8px;
}
.q-icon svg{width:100%;height:100%;}

.qname{
  font-family:'Orbitron',monospace;
  font-size:clamp(13px,3.5vw,22px);
  font-weight:900;letter-spacing:2px;margin:4px 0;
}
.qdesc{
  font-size:clamp(13px,2.2vw,16px);color:#777;
  max-width:560px;line-height:1.6;margin-top:6px;
}
.detail-box{
  background:#040810;border:1px solid #0a2540;
  border-radius:10px;padding:14px 20px;
  margin-top:12px;max-width:620px;width:100%;
  animation:si 0.35s ease;
}
@keyframes si{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.dtitle{
  font-family:'Orbitron',monospace;font-size:8px;
  letter-spacing:3px;color:#00aaff;margin-bottom:8px;
}
.dtext{font-size:14px;color:#6a8aa0;line-height:1.75;}
.score-tag{
  position:absolute;top:14px;right:16px;
  font-family:'Orbitron',monospace;font-size:10px;
  color:#ff8c00;letter-spacing:2px;
}
.idle{color:#1e1e1e;font-size:14px;}

/* ============ BOTÕES ============ */
.btn-row{display:flex;gap:10px;margin-top:12px;justify-content:center;flex-wrap:wrap;}
.btn{
  font-family:'Orbitron',monospace;font-size:10px;
  letter-spacing:2px;padding:11px 20px;
  border:none;border-radius:8px;cursor:pointer;
  text-transform:uppercase;font-weight:700;transition:all 0.2s;
}
.bm{background:#0b1f0b;color:#00cc44;border:1px solid #1a5a1a;}
.bm:hover{background:#142814;box-shadow:0 0 16px #00cc4444;transform:translateY(-1px);}
.br{background:#1f1300;color:#ffaa00;border:1px solid #5a3800;}
.br:hover{background:#2a1c00;box-shadow:0 0 16px #ffaa0044;transform:translateY(-1px);}
.bn{background:#001226;color:#00aaff;border:1px solid #003a66;}
.bn:hover{background:#001a36;box-shadow:0 0 16px #00aaff44;transform:translateY(-1px);}
.bx{background:#140014;color:#cc55ff;border:1px solid #660099;}
.bx:hover{box-shadow:0 0 16px #aa00ff55;transform:translateY(-1px);}

@media(max-width:600px){
  .dash-main{grid-template-columns:1fr 160px 1fr;}
  .speed-num{font-size:34px;}
  .center-display{padding:8px 6px;}
  .btn{padding:10px 14px;font-size:9px;}
}
@media(max-width:420px){
  .dash-main{grid-template-columns:80px 1fr 80px;}
  .speed-num{font-size:26px;}
}
</style>
</head>
<body>

<div class="shell">

    <!-- LADO ESQUERDO -->
    <div class="side-panel">

        </svg>
      </div>

      <div class="lights-side" id="grid-left"></div>

    <!-- DISPLAY CENTRAL -->
    <div class="center-display">
      <div class="speed-box">
        <div class="speed-num">0</div>

      </div>
      <div class="odo-row">ODO &nbsp; 45847 km</div>
      <!-- barra combustível -->
      <div class="bars-row">

            <div class="bar-seg"></div>
            <div class="bar-seg"></div>
          </div>
        </div>
        <div class="bar-group">
          <div class="bar-label"><span>C</span><span>H</span></div>

            <div class="bar-seg temp-on"></div>
            <div class="bar-seg"></div>
            <div class="bar-seg"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- LADO DIREITO -->
    <div class="side-panel">
      <!-- seta direita -->
      <div class="arrow-right">
        <svg class="arrow-svg" id="arrow-r" viewBox="0 0 52 32" fill="none">
          <path d="M26 2 L48 16 L26 30 L26 22 L4 22 L4 10 L26 10 Z" fill="#00cc44" stroke="#00cc44" stroke-width="1"/>
        </svg>

      <div class="lights-side" id="grid-right"></div>

  </div>
</div>

<!-- PROGRESS -->
<div class="prog-wrap"><div class="prog-fill" id="pf" style="width:0%"></div></div>

<!-- QUIZ -->
<div class="quiz-card" id="qcard">

  <div class="idle">Iniciando...</div>
</div>
<div class="btn-row" id="brow"></div>

   desc:'Motor superaquecendo — pare imediatamente.',
   detail:'Temperatura ultrapassou ~115 °C. Causas: falta de líquido de arrefecimento, termostato travado, ventoinha ou bomba d\'água com defeito. Ligue o aquecedor no máximo para dissipar calor. NUNCA abra o radiador quente — pressão causa queimaduras graves.',
   svg:`<svg viewBox="0 0 40 40" fill="none"><rect x="16" y="6" width="8" height="18" rx="4" stroke="currentColor" stroke-width="2.2"/><circle cx="20" cy="28" r="6" stroke="currentColor" stroke-width="2.2"/><circle cx="20" cy="28" r="3" fill="currentColor" opacity="0.5"/><rect x="18" y="10" width="4" height="11" rx="2" fill="currentColor" opacity="0.3"/><line x1="10" y1="13" x2="14" y2="13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="10" y1="18" x2="14" y2="18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="10" y1="23" x2="14" y2="23" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>`},

  {id:'esp',      side:'R', cl:'ca',
   nome:'CONTROLE DE ESTABILIDADE',
   desc:'ESP acionando (piscando) ou com falha (fixo).',
   detail:'Piscando = sistema corrigindo derrapagem ativamente — reduza velocidade. Fixo = ESP desligado manualmente ou com falha. O ESP usa freios individuais para manter a trajetória. Sem ele, capotamento e saída de pista são mais prováveis em manobras bruscas.',
   svg:`<svg viewBox="0 0 40 40" fill="none"><path d="M6 35 Q11 15 20 17 Q29 19 33 8" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"/><path d="M20 24L18 31L25 30Z" fill="currentColor" opacity="0.7"/><circle cx="7" cy="36" r="3.5" stroke="currentColor" stroke-width="2"/><circle cx="32" cy="36" r="3.5" stroke="currentColor" stroke-width="2"/></svg>`},

  {id:'airbag',   side:'R', cl:'cr',
   nome:'FALHA NO AIRBAG / SRS',
   desc:'Airbag com defeito — pode não funcionar em colisão.',
   detail:'O módulo SRS detectou falha em sensor de impacto, inflator, pretensor de cinto ou conector. Em colisão, airbag pode não abrir ou disparar sem motivo. Ambos são perigosos. Exige diagnóstico eletrônico especializado com urgência.',
   svg:`<svg viewBox="0 0 40 40" fill="none"><ellipse cx="20" cy="17" rx="11" ry="8.5" stroke="currentColor" stroke-width="2.2"/><circle cx="20" cy="17" r="3.5" fill="currentColor" opacity="0.3"/><path d="M11 23 Q8 30 14 33 L26 33 Q32 30 29 23" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><line x1="20" y1="8.5" x2="20" y2="5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="14" y1="10" x2="11" y2="7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="26" y1="10" x2="29" y2="7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>`},
];

// ================================================================
// ESTADO
// ================================================================
let curIdx = -1;
let phase = 'idle';
let done = new Set();

function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [b[i],b[j]]=[b[j],b[i]];
  }
  return b;
}

let order = shuffle(LIGHTS.map((_,i)=>i));
let orderPos = 0;

// ================================================================
// MONTA GRIDS
// ================================================================
const gridL = document.getElementById('grid-left');
const gridR = document.getElementById('grid-right');

LIGHTS.forEach((l, i) => {
  const cell = document.createElement('div');
  cell.className = `lc ${l.cl}`;
  cell.id = `lc${i}`;
  cell.innerHTML = l.svg;
  cell.title = l.nome;
  cell.addEventListener('click', () => activate(i));
  if(l.side === 'L') gridL.appendChild(cell);
  else gridR.appendChild(cell);
});

// ================================================================
// ATIVA UMA LUZ
// ================================================================
function activate(idx) {
  document.querySelectorAll('.lc.active').forEach(c => c.classList.remove('active'));
  const cell = document.getElementById('lc' + idx);
  if(cell) cell.classList.add('active');
  curIdx = idx;
  phase = 'question';
  render();
}

// ================================================================
// PRÓXIMA LUZ
// ================================================================
function nextLight() {
  if(done.size >= LIGHTS.length){ showComplete(); return; }
  if(orderPos >= order.length){ orderPos = 0; order = shuffle(LIGHTS.map((_,i)=>i)); }
  let n = order[orderPos++];
  let tries = 0;
  while(done.has(n) && tries < LIGHTS.length) {
    if(orderPos >= order.length){ orderPos = 0; order = shuffle(LIGHTS.map((_,i)=>i)); }
    n = order[orderPos++];
    tries++;
  }
  activate(n);
}

// ================================================================
// COR DA CLASSE
// ================================================================
function colorOf(cl){
  return {cr:'#ff2b2b', ca:'#ffaa00', cg:'#00cc44', cb:'#00aaff', cw:'#ccddff'}[cl] || '#fff';
}

// ================================================================
// RENDER — sem onclick inline para evitar bugs
// ================================================================
function render() {
  const card = document.getElementById('qcard');
  const brow = document.getElementById('brow');
  const pf   = document.getElementById('pf');
  const st   = document.getElementById('stag');

  pf.style.width = `${(done.size / LIGHTS.length) * 100}%`;
  st.textContent = `${done.size}/${LIGHTS.length}`;

  const l = LIGHTS[curIdx];
  const c = colorOf(l.cl);

  // --- CONTENT ---
  if(phase === 'question') {
    card.innerHTML = `
      <span class="score-tag">${done.size}/${LIGHTS.length}</span>
      <div class="qphase blink">⚡ NOVA LUZ ACENDEU!</div>
      <div class="q-icon" style="color:${c}">${l.svg}</div>
      <div class="qname" style="color:#222">???</div>
      <div class="qdesc" style="color:#1e1e1e">Identifique esta luz antes de revelar</div>
    `;
    brow.innerHTML = '';
    const btnOuvir = makeBtn('bm', '🎙️ OUVIR RESPOSTA', () => { phase='manual'; render(); });
    const btnRev   = makeBtn('br', '💡 REVELAR', () => { phase='revealed'; render(); });
    brow.appendChild(btnOuvir);
    brow.appendChild(btnRev);
  }

  else if(phase === 'manual') {
    card.innerHTML = `
      <span class="score-tag">${done.size}/${LIGHTS.length}</span>
      <div class="qphase blink">🎙️ AGUARDANDO RESPOSTA...</div>
      <div class="q-icon" style="color:${c};opacity:0.4">${l.svg}</div>
      <div class="qdesc" style="color:#333;margin-top:8px">Clique em REVELAR quando a pessoa terminar</div>
    `;
    brow.innerHTML = '';
    const btnRev = makeBtn('br', '💡 REVELAR RESPOSTA', () => { phase='revealed'; render(); });
    brow.appendChild(btnRev);
  }

  else if(phase === 'revealed') {
    card.innerHTML = `
      <span class="score-tag">${done.size}/${LIGHTS.length}</span>
      <div class="qphase">✅ RESPOSTA</div>
      <div class="q-icon" style="color:${c}">${l.svg}</div>
      <div class="qname" style="color:${c}">${l.nome}</div>
      <div class="qdesc">${l.desc}</div>
    `;
    brow.innerHTML = '';
    const btnExp  = makeBtn('bm', '🎙️ VOU EXPLICAR DETALHADO', () => { phase='detail'; render(); });
    const btnNext = makeBtn('bn', '⏭ PRÓXIMA LUZ', () => { markAndNext(); });
    brow.appendChild(btnExp);
    brow.appendChild(btnNext);
  }

  else if(phase === 'detail') {
    done.add(curIdx);
    const cell = document.getElementById('lc' + curIdx);
    if(cell) cell.classList.add('done');
    pf.style.width = `${(done.size / LIGHTS.length) * 100}%`;
    st.textContent = `${done.size}/${LIGHTS.length}`;

    card.innerHTML = `
      <span class="score-tag">${done.size}/${LIGHTS.length}</span>
      <div class="qphase">🎓 EXPLICAÇÃO COMPLETA</div>
      <div class="q-icon" style="color:${c}">${l.svg}</div>
      <div class="qname" style="color:${c}">${l.nome}</div>
      <div class="detail-box">
        <div class="dtitle">📋 DETALHES TÉCNICOS</div>
        <div class="dtext">${l.detail}</div>
      </div>
    `;
    brow.innerHTML = '';
    const btnNext = makeBtn('bn', '⏭ PRÓXIMA LUZ', () => { nextLight(); });
    brow.appendChild(btnNext);
    if(done.size >= LIGHTS.length){
      const btnRestart = makeBtn('bx', '🔄 REINICIAR', () => { restart(); });
      brow.appendChild(btnRestart);
    }
  }
}

// ================================================================
// HELPER — cria botão SEM onclick inline (evita bug de escopo)
// ================================================================
function makeBtn(cls, label, fn) {
  const b = document.createElement('button');
  b.className = 'btn ' + cls;
  b.textContent = label;
  b.addEventListener('click', fn);
  return b;
}

function markAndNext() {
  done.add(curIdx);
  const cell = document.getElementById('lc' + curIdx);
  if(cell) cell.classList.add('done');
  nextLight();
}

function showComplete() {
  document.querySelectorAll('.lc.active').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('qcard');
  const brow = document.getElementById('brow');
  card.innerHTML = `
    <div style="font-size:56px;margin-bottom:10px">🏆</div>
    <div class="qphase" style="font-size:14px">PARABÉNS!</div>
    <div class="qname" style="color:#ffaa00;margin-top:8px">TODAS AS LUZES EXPLICADAS!</div>
    <div class="qdesc" style="margin-top:8px">Você cobriu todas as ${LIGHTS.length} luzes do painel.</div>
  `;
  brow.innerHTML = '';
  brow.appendChild(makeBtn('bx', '🔄 REINICIAR QUIZ', () => { restart(); }));
}

function restart() {
  done.clear();
  orderPos = 0;
  order = shuffle(LIGHTS.map((_,i) => i));
  document.querySelectorAll('.lc').forEach(c => c.classList.remove('active','done'));
  document.getElementById('pf').style.width = '0%';
  document.getElementById('stag').textContent = '0/' + LIGHTS.length;
  document.getElementById('qcard').innerHTML = `<span class="score-tag">0/${LIGHTS.length}</span><div class="idle">Reiniciando...</div>`;
  document.getElementById('brow').innerHTML = '';
  setTimeout(nextLight, 600);
}

// INICIA
setTimeout(nextLight, 800);
</script>
</body>
</html>
