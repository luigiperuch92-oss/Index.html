<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Pro - Realismo Extremo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');

:root {
  --bg-dark: #020202;
  --led-red: #ff2a2a;
  --led-amber: #ffaa00;
  --led-green: #00ff66;
  --led-blue: #00aaff;
  --led-off: rgba(255, 255, 255, 0.03);
}

* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

body {
  background: var(--bg-dark);
  background-image: radial-gradient(circle at 50% 50%, #1a1a24 0%, #000 80%);
  color: #fff;
  font-family: 'Rajdhani', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.dashboard {
  width: 90%;
  max-width: 900px;
  background: #0a0a0c;
  border-radius: 40px;
  border: 1px solid rgba(255,255,255,0.05);
  box-shadow: 0 40px 80px rgba(0,0,0,0.9), inset 0 0 20px rgba(255,255,255,0.02);
  padding: 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.center-display {
  width: 100%;
  max-width: 500px;
  height: 150px;
  background: #000;
  border: 1px solid #1a1a1a;
  border-radius: 15px;
  margin-bottom: 30px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow: inset 0 0 30px rgba(0,0,0,1);
}

.prompt-target {
  font-family: 'Orbitron', sans-serif;
  font-size: 28px;
  color: var(--led-amber);
  text-shadow: 0 0 15px var(--led-amber);
}

.lights-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}

/* ESTILO DO BOTÃO (SLOT) */
.light-slot {
  width: 80px;
  height: 80px;
  background: #080808;
  border: 1px solid #151515;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: 0.2s;
}

/* ESTILO DO ÍCONE (SVG) */
.light-slot svg {
  width: 50%;
  height: 50%;
  fill: var(--led-off);
  transition: 0.3s;
}

/* EFEITOS DE LUZ ACESA */
.on-red svg { fill: var(--led-red); filter: drop-shadow(0 0 8px var(--led-red)) drop-shadow(0 0 15px var(--led-red)); }
.on-amber svg { fill: var(--led-amber); filter: drop-shadow(0 0 8px var(--led-amber)) drop-shadow(0 0 15px var(--led-amber)); }
.on-green svg { fill: var(--led-green); filter: drop-shadow(0 0 8px var(--led-green)) drop-shadow(0 0 15px var(--led-green)); }

.btn-engine {
  margin-top: 30px;
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: radial-gradient(circle, #331111, #110000);
  border: 4px solid #222;
  color: #fff;
  font-family: 'Orbitron';
  font-size: 12px;
  cursor: pointer;
}

.btn-engine.running {
  border-color: var(--led-red);
  box-shadow: 0 0 30px rgba(255,0,0,0.5);
}
</style>
</head>
<body>

<div class="dashboard">
  <div class="center-display">
    <div id="promptText" style="color: #444; font-size: 14px;">STATUS DO SISTEMA</div>
    <div class="prompt-target" id="promptTarget">SISTEMA OFF</div>
  </div>

  <div class="lights-grid" id="grid">
    </div>
</div>

<button class="btn-engine" id="btnStart" onclick="startSystem()">START ENGINE</button>

<script>
// ÍCONES REAIS EM SVG
const icons = {
  engine: `<svg viewBox="0 0 512 512"><path d="M495.9 166.6c-3.1 10.5-14.2 16.5-24.7 13.4s-16.5-14.2-13.4-24.7l12.9-43.7c3.1-10.5 14.2-16.5 24.7-13.4s16.5 14.2 13.4 24.7l-12.9 43.7zM64 352c-17.7 0-32-14.3-32-32V224c0-17.7 14.3-32 32-32H96V128c0-17.7 14.3-32 32-32h64c17.7 0 32 14.3 32 32v32h128V128c0-17.7 14.3-32 32-32h32c17.7 0 32 14.3 32 32v121.1c25.4 12.1 42.1 36.6 42.1 64.9V352c0 17.7-14.3 32-32 32H64zM160 320a32 32 0 1 0 0-64 32 32 0 1 0 0 64z"/></svg>`,
  
  tpms: `<svg viewBox="0 0 512 512"><path d="M128 448c-35.3 0-64-28.7-64-64v-64c0-106 86-192 192-192s192 86 192 192v64c0 35.3-28.7 64-64 64H128zm128-288c-17.7 0-32 14.3-32 32v96c0 17.7 14.3 32 32 32s32-14.3 32-32v-96c0-17.7-14.3-32-32-32zm0 192a24 24 0 1 0 0 48 24 24 0 1 0 0-48z"/><path d="M448 352h32c17.7 0 32 14.3 32 32v32c0 17.7-14.3 32-32 32h-32v-96zM32 352h32v96H32c-17.7 0-32-14.3-32-32v-32c0-17.7 14.3-32 32-32z" opacity="0.2"/></svg>`,
  
  steering: `<svg viewBox="0 0 512 512"><path d="M256 0C114.6 0 0 114.6 0 256s114.6 256 256 256s256-114.6 256-256S397.4 0 256 0zM256 464c-114.7 0-208-93.3-208-208S141.3 48 256 48s208 93.3 208 208s-93.3 208-208 208zM256 128c-17.7 0-32 14.3-32 32v96c0 17.7 14.3 32 32 32s32-14.3 32-32v-96c0-17.7-14.3-32-32-32zm0 192a24 24 0 1 0 0 48 24 24 0 1 0 0-48z"/></svg>`,
  
  neblina: `<svg viewBox="0 0 512 512"><path d="M0 192c0-17.7 14.3-32 32-32H192c17.7 0 32 14.3 32 32v128c0 17.7-14.3 32-32 32H32c-17.7 0-32-14.3-32-32V192zM352 160c-17.7 0-32 14.3-32 32s14.3 32 32 32h96c17.7 0 32-14.3 32-32s-14.3-32-32-32H352zm0 128c-17.7 0-32 14.3-32 32s14.3 32 32 32h96c17.7 0 32-14.3 32-32s-14.3-32-32-32H352z"/></svg>`
};

const DB = [
  { id: 'engine', icon: icons.engine, color: 'amber', name: 'CHECK ENGINE' },
  { id: 'tpms', icon: icons.tpms, color: 'amber', name: 'PRESSÃO PNEU' },
  { id: 'steering', icon: icons.steering, color: 'amber', name: 'DIREÇÃO' },
  { id: 'neblina', icon: icons.neblina, color: 'green', name: 'NEBLINA' }
];

let isRunning = false;
let currentTarget = null;
const grid = document.getElementById('grid');

DB.forEach(light => {
  const div = document.createElement('div');
  div.className = 'light-slot';
  div.id = `slot-${light.id}`;
  div.innerHTML = light.icon;
  div.onclick = () => checkAnswer(light);
  grid.appendChild(div);
});

function startSystem() {
  if(isRunning) return;
  isRunning = true;
  document.getElementById('btnStart').classList.add('running');
  
  // Teste de lâmpadas (Acende tudo e apaga)
  DB.forEach(l => document.getElementById(`slot-${l.id}`).classList.add(`on-${l.color}`));
  
  setTimeout(() => {
    DB.forEach(l => document.getElementById(`slot-${l.id}`).classList.remove(`on-${l.color}`));
    nextQuestion();
  }, 1500);
}

function nextQuestion() {
  const rand = DB[Math.floor(Math.random() * DB.length)];
  currentTarget = rand;
  document.getElementById('promptTarget').innerText = rand.name;
}

function checkAnswer(clicked) {
  if(!isRunning || !currentTarget) return;
  
  if(clicked.id === currentTarget.id) {
    document.getElementById(`slot-${clicked.id}`).classList.add(`on-${clicked.color}`);
    document.getElementById('promptTarget').style.color = "var(--led-green)";
    setTimeout(() => {
      document.getElementById('promptTarget').style.color = "var(--led-amber)";
      nextQuestion();
    }, 1000);
  }
}
</script>
</body>
</html>
