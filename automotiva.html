<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Luzes de Alerta do Carro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --panel: #141414;
    --bezel: #1a1a1a;
    --border: #2a2a2a;
    --text: #c8c8c8;
    --dim: #666;
    --mono: 'Share+Tech+Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  h1 {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 28px;
    text-align: center;
  }

  /* === PAINEL === */
  .dashboard {
    background: #111;
    border: 1px solid #222;
    border-radius: 12px;
    padding: 20px 24px 18px;
    width: 100%;
    max-width: 560px;
    box-shadow: 0 4px 24px rgba(0,0,0,.6);
    margin-bottom: 28px;
  }

  .dash-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: #333;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .lights-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 10px;
    justify-items: center;
  }

  /* === LUZ === */
  .light {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    transition: opacity .15s;
  }
  .light:hover { opacity: .85; }

  .light-icon {
    width: 38px;
    height: 38px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: #0a0a0a;
    border: 1px solid #1e1e1e;
  }

  /* luz apagada */
  .light-icon svg { opacity: .18; }

  /* luz acesa — só o SVG fica visível */
  .light.active .light-icon svg { opacity: 1; }

  /* label abaixo */
  .light-lbl {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    color: #2a2a2a;
    text-align: center;
    line-height: 1.2;
    width: 38px;
  }
  .light.active .light-lbl { color: #555; }

  /* === CORES DAS LUZES === */
  .red    svg { fill: #e03030; color: #e03030; }
  .orange svg { fill: #e08020; color: #e08020; }
  .yellow svg { fill: #d4b800; color: #d4b800; }
  .green  svg { fill: #2db050; color: #2db050; }
  .blue   svg { fill: #3090e0; color: #3090e0; }

  .light.active.red    .light-icon { box-shadow: 0 0 6px 1px rgba(220,48,48,.35); }
  .light.active.orange .light-icon { box-shadow: 0 0 6px 1px rgba(220,128,32,.35); }
  .light.active.yellow .light-icon { box-shadow: 0 0 6px 1px rgba(212,184,0,.3); }
  .light.active.green  .light-icon { box-shadow: 0 0 6px 1px rgba(45,176,80,.3); }
  .light.active.blue   .light-icon { box-shadow: 0 0 6px 1px rgba(48,144,224,.3); }

  /* === QUIZ === */
  .quiz-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 22px 24px;
    width: 100%;
    max-width: 560px;
  }

  .question-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }

  .q-icon {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0d0d0d;
    border: 1px solid #222;
    flex-shrink: 0;
  }
  .q-icon svg { opacity: 1; }

  .q-text {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.45;
    color: #bbb;
  }

  .q-counter {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    margin-bottom: 14px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }

  .opt {
    background: #0e0e0e;
    border: 1px solid #252525;
    border-radius: 6px;
    padding: 11px 14px;
    font-size: 13px;
    color: #999;
    cursor: pointer;
    transition: border-color .12s, color .12s, background .12s;
    text-align: left;
  }
  .opt:hover:not(:disabled) { border-color: #444; color: #ccc; background: #141414; }
  .opt.correct { border-color: #2d7a3a; background: #0d1f11; color: #5ecf72; }
  .opt.wrong   { border-color: #7a2d2d; background: #1f0d0d; color: #cf5e5e; }
  .opt:disabled { cursor: default; }

  .feedback {
    font-size: 12.5px;
    line-height: 1.5;
    color: #777;
    min-height: 36px;
    margin-bottom: 14px;
  }
  .feedback.ok  { color: #4a9e5c; }
  .feedback.err { color: #9e4a4a; }

  .btn-next {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 6px;
    color: #999;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 10px 22px;
    cursor: pointer;
    transition: border-color .12s, color .12s;
  }
  .btn-next:hover { border-color: #555; color: #ccc; }
  .btn-next:disabled { opacity: .35; cursor: default; }

  /* === RESULTADO === */
  .result-box {
    text-align: center;
    padding: 10px 0 4px;
  }
  .result-score {
    font-family: 'Share Tech Mono', monospace;
    font-size: 42px;
    color: #ccc;
    letter-spacing: 2px;
  }
  .result-msg {
    font-size: 13px;
    color: var(--dim);
    margin-top: 8px;
    margin-bottom: 18px;
  }
  .btn-restart {
    background: transparent;
    border: 1px solid #333;
    border-radius: 6px;
    color: #888;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 9px 20px;
    cursor: pointer;
    transition: border-color .12s, color .12s;
  }
  .btn-restart:hover { border-color: #555; color: #ccc; }

  /* hidden */
  .hidden { display: none; }
</style>
</head>
<body>

<h1>Quiz · Painel de Instrumentos</h1>

<!-- PAINEL -->
<div class="dashboard">

</div>

<div class="quiz-box" id="quizBox">
  <div id="quizContent">
    <div class="q-counter" id="qCounter">Pergunta 1 / 12</div>
    <div class="question-header">
      <div class="q-icon" id="qIcon"></div>
      <div class="q-text" id="qText"></div>
    </div>
    <div class="options" id="optionsBox"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn-next" id="btnNext" disabled>Próxima →</button>
  </div>
  <div class="result-box hidden" id="resultBox">
    <div class="result-score" id="resultScore"></div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="btn-restart" onclick="restart()">↺ Recomeçar</button>

    explanation: 'Indica reserva de combustível. Na maioria dos carros populares, há ainda cerca de 40 a 60 km de autonomia, mas não arrisque.',

    correct: 0,

// ==================== ESTADO ====================
let currentQ = 0;
let score = 0;
let answered = false;
const order = shuffleArray([...QUESTIONS.keys()]);

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ==================== PAINEL ====================
function buildPanel() {
  const grid = document.getElementById('lightsGrid');
  grid.innerHTML = '';
  LIGHTS.forEach(l => {
    const div = document.createElement('div');
    div.className = `light ${l.color}`;
    div.id = `light-${l.id}`;
    div.innerHTML = `<div class="light-icon">${l.svg}</div><div class="light-lbl">${l.lbl}</div>`;
    grid.appendChild(div);
  });
}

function activateLight(id) {
  // apagar todas
  document.querySelectorAll('.light').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`light-${id}`);
  if (el) el.classList.add('active');
}

// ==================== QUIZ ====================
function loadQuestion() {
  const idx = order[currentQ];
  const q = QUESTIONS[idx];
  answered = false;

  document.getElementById('qCounter').textContent = `Pergunta ${currentQ + 1} / ${order.length}`;

  // ícone
  const light = LIGHTS.find(l => l.id === q.lightId);
  const qIcon = document.getElementById('qIcon');
  qIcon.className = `q-icon ${light.color}`;
  qIcon.innerHTML = light.svg;

  document.getElementById('qText').textContent = q.question;

  // opções
  const optBox = document.getElementById('optionsBox');
  optBox.innerHTML = '';
  const shuffled = shuffleArray([...q.options.keys()]);
  shuffled.forEach(oi => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = q.options[oi];
    btn.dataset.idx = oi;
    btn.onclick = () => selectOption(oi, q.correct, q.explanation, btn, optBox);
    optBox.appendChild(btn);
  });

  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('btnNext').disabled = true;

  activateLight(q.lightId);
}

function selectOption(chosen, correct, explanation, clickedBtn, optBox) {
  if (answered) return;
  answered = true;

  const allBtns = optBox.querySelectorAll('.opt');
  allBtns.forEach(b => {
    b.disabled = true;
    if (parseInt(b.dataset.idx) === correct) b.classList.add('correct');
  });

  const fb = document.getElementById('feedback');
  if (chosen === correct) {
    score++;
    clickedBtn.classList.add('correct');
    fb.textContent = '✓ Correto! ' + explanation;
    fb.className = 'feedback ok';
  } else {
    clickedBtn.classList.add('wrong');
    fb.textContent = '✗ Errado. ' + explanation;
    fb.className = 'feedback err';
  }

  document.getElementById('btnNext').disabled = false;
}

document.getElementById('btnNext').addEventListener('click', () => {
  currentQ++;
  if (currentQ >= order.length) {
    showResult();
  } else {
    loadQuestion();
  }
});

function showResult() {
  // apagar luzes
  document.querySelectorAll('.light').forEach(el => el.classList.remove('active'));

  document.getElementById('quizContent').classList.add('hidden');
  const rb = document.getElementById('resultBox');
  rb.classList.remove('hidden');

  const pct = Math.round((score / order.length) * 100);
  document.getElementById('resultScore').textContent = `${score} / ${order.length}`;

  let msg;
  if (pct === 100) msg = 'Perfeito! Você conhece cada luz do painel.';
  else if (pct >= 75) msg = 'Muito bom! Você está bem preparado.';
  else if (pct >= 50) msg = 'Razoável. Ainda vale revisar algumas luzes.';
  else msg = 'Atenção. Conhecer as luzes pode salvar seu carro — e você.';

  document.getElementById('resultMsg').textContent = msg;
}

function restart() {
  currentQ = 0;
  score = 0;
  order.splice(0, order.length, ...shuffleArray([...QUESTIONS.keys()]));
  document.getElementById('resultBox').classList.add('hidden');
  document.getElementById('quizContent').classList.remove('hidden');
  loadQuestion();
}

// ==================== INIT ====================
buildPanel();
loadQuestion();
</script>
