<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Painel Ford Fusion 2020</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#060606;
  font-family:'Rajdhani',sans-serif;
  color:#ccc;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:14px;
  background-image:radial-gradient(ellipse at 50% 0%,#120a00 0%,#060606 65%);
}

/* ======= DASHBOARD SHELL ======= */
.shell{
  width:100%;max-width:920px;
  background:linear-gradient(180deg,#181818 0%,#0e0e0e 100%);
  border-radius:28px 28px 20px 20px;
  border:2px solid #222;
  box-shadow:0 0 100px #00000099, inset 0 1px 0 #333;
  padding:16px 12px 12px;
  position:relative;overflow:hidden;
}
.shell::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 5%,#e05000 25%,#ff8c00 50%,#e05000 75%,transparent 95%);
  opacity:0.7;
}

/* label topo */
.brand-bar{
  font-family:'Orbitron',monospace;font-size:8px;letter-spacing:5px;
  color:#2a2a2a;text-align:center;margin-bottom:10px;text-transform:uppercase;
}

/* ======= LAYOUT 3 COLUNAS ======= */
.dash-row{
  display:grid;
  grid-template-columns:190px 1fr 190px;
  gap:8px;align-items:center;
}
@media(max-width:660px){
  .dash-row{grid-template-columns:110px 1fr 110px;}
  .gauge-wrap{width:110px!important;height:110px!important;}
}

/* ======= GAUGES ======= */
.gauge-wrap{width:190px;height:190px;position:relative;flex-shrink:0;}
.gauge-wrap svg{width:100%;height:100%;}

/* ======= CENTER LIGHTS AREA ======= */
.center{
  background:#090909;
  border-radius:14px;border:1px solid #1e1e1e;
  padding:10px 6px;
  display:flex;flex-direction:column;gap:6px;
}

.row-label{
  font-family:'Orbitron',monospace;font-size:7px;
  letter-spacing:2px;color:#1e1e1e;text-align:center;
}

.lights-row{
  display:flex;flex-wrap:wrap;justify-content:center;gap:5px;
}

/* ======= LIGHT CELL ======= */
.lc{
  width:42px;height:42px;
  display:flex;align-items:center;justify-content:center;
  border-radius:6px;border:1px solid transparent;
  cursor:pointer;transition:all 0.25s;flex-shrink:0;
}
.lc svg{width:32px;height:32px;opacity:0.12;filter:grayscale(1);transition:all 0.3s;}
.lc.active svg{opacity:1;filter:grayscale(0) drop-shadow(0 0 5px currentColor);transform:scale(1.2);}
.lc.active{border-color:currentColor;background:rgba(255,255,255,0.03);}
.lc.done svg{opacity:0.05;filter:grayscale(1);}
.lc.done{border-color:transparent;background:transparent;}

/* color classes */
.cr{color:#ff2b2b;}
.ca{color:#ffaa00;}
.cg{color:#00dd66;}
.cb{color:#00aaff;}
.cw{color:#dde8ff;}
.co{color:#ff6600;}

/* ======= PROGRESS ======= */
.prog-wrap{width:100%;max-width:920px;height:3px;background:#111;border-radius:3px;margin:10px 0 12px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#cc4400,#ff8c00);border-radius:3px;transition:width 0.5s;box-shadow:0 0 8px #ff8c0088;}

/* ======= QUIZ CARD ======= */
.quiz-card{
  width:100%;max-width:920px;
  background:linear-gradient(145deg,#111116,#0c0c12);
  border:1px solid #1e1e1e;border-radius:16px;
  padding:22px 24px;min-height:170px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  box-shadow:0 8px 40px #00000088;position:relative;
}
.qphase{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:3px;color:#ff8c00;margin-bottom:10px;}
.qphase.blink{animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}
.q-icon{width:64px;height:64px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;}
.q-icon svg{width:100%;height:100%;}
.qname{font-family:'Orbitron',monospace;font-size:clamp(14px,3.5vw,24px);font-weight:900;letter-spacing:2px;margin:4px 0;}
.qdesc{font-size:clamp(13px,2.2vw,16px);color:#888;max-width:560px;line-height:1.6;margin-top:6px;}
.detail-box{background:#04090f;border:1px solid #0a2a44;border-radius:10px;padding:14px 20px;margin-top:12px;max-width:620px;width:100%;animation:si 0.35s ease;}
@keyframes si{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.dtitle{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:3px;color:#00aaff;margin-bottom:8px;}
.dtext{font-size:14px;color:#7a9ab0;line-height:1.75;}
.score-tag{position:absolute;top:14px;right:16px;font-family:'Orbitron',monospace;font-size:10px;color:#ff8c00;letter-spacing:2px;}
.idle{color:#222;font-size:14px;letter-spacing:1px;}

/* ======= BUTTONS ======= */
.btn-row{display:flex;gap:10px;margin-top:14px;justify-content:center;flex-wrap:wrap;}
.btn{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;padding:11px 20px;border:none;border-radius:8px;cursor:pointer;text-transform:uppercase;font-weight:700;transition:all 0.2s;}
.bm{background:#0b1f0b;color:#00dd66;border:1px solid #1a5a1a;}
.bm:hover{background:#142814;box-shadow:0 0 16px #00dd6644;transform:translateY(-1px);}
.br{background:#1f1300;color:#ffaa00;border:1px solid #5a3800;}
.br:hover{background:#2a1c00;box-shadow:0 0 16px #ffaa0044;transform:translateY(-1px);}
.bn{background:#001226;color:#00aaff;border:1px solid #003a66;}
.bn:hover{background:#001a36;box-shadow:0 0 16px #00aaff44;transform:translateY(-1px);}
.bx{background:#140014;color:#cc55ff;border:1px solid #660099;}
.bx:hover{box-shadow:0 0 16px #aa00ff55;transform:translateY(-1px);}
</style>
</head>

// ===== STATE =====
let curIdx=-1, phase='idle';
let done=new Set();
let order=shuffle(LIGHTS.map((_,i)=>i)), orderPos=0;

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

// Build grid
const grid=document.getElementById('lgrid');
LIGHTS.forEach((l,i)=>{
  const c=document.createElement('div');
  c.className=`lc ${l.cl}`;c.id=`lc${i}`;
  c.innerHTML=l.svg;c.title=l.nome;
  c.onclick=()=>activate(i);
  grid.appendChild(c);
});

function activate(idx){
  document.querySelectorAll('.lc.active').forEach(c=>c.classList.remove('active'));
  document.getElementById(`lc${idx}`).classList.add('active');
  curIdx=idx;phase='question';render();
}

function nextLight(){
  if(done.size>=LIGHTS.length){showComplete();return;}
  if(orderPos>=order.length){orderPos=0;order=shuffle(LIGHTS.map((_,i)=>i));}
  let n=order[orderPos++],tries=0;
  while(done.has(n)&&tries<LIGHTS.length){
    if(orderPos>=order.length){orderPos=0;order=shuffle(LIGHTS.map((_,i)=>i));}
    n=order[orderPos++];tries++;
  }
  activate(n);
}

function colorOf(cl){return{cr:'#ff2b2b',ca:'#ffaa00',cg:'#00dd66',cb:'#00aaff',cw:'#dde8ff',co:'#ff6600'}[cl];}

function render(){
  const card=document.getElementById('qcard');
  const brow=document.getElementById('brow');
  const pf=document.getElementById('pf');
  const st=document.getElementById('stag');
  pf.style.width=`${(done.size/LIGHTS.length)*100}%`;
  st.textContent=`${done.size}/${LIGHTS.length}`;
  const l=LIGHTS[curIdx];
  const c=colorOf(l.cl);

  if(phase==='question'){
    card.innerHTML=`
      <span class="score-tag">${done.size}/${LIGHTS.length}</span>
      <div class="qphase blink">⚡ NOVA LUZ ACENDEU NO PAINEL!</div>
      <div class="q-icon" style="color:${c}">${l.svg}</div>
      <div class="qname" style="color:#333;font-size:20px">???</div>
      <div class="qdesc" style="color:#2a2a2a">Tente identificar esta luz antes de revelar</div>
    `;
    brow.innerHTML=`
      <button class="btn bm" onclick="setPhase('manual')">🎙️ OUVIR RESPOSTA</button>
      <button class="btn br" onclick="setPhase('revealed')">💡 REVELAR</button>
    `;
  }
  if(phase==='manual'){
    card.innerHTML=`
      <span class="score-tag">${done.size}/${LIGHTS.length}</span>
      <div class="qphase blink">🎙️ AGUARDANDO RESPOSTA DA PESSOA...</div>
      <div class="q-icon" style="color:${c};opacity:0.4">${l.svg}</div>
      <div class="qdesc" style="color:#2a2a2a;margin-top:8px">Clique em REVELAR quando ela terminar de responder</div>
    `;
    brow.innerHTML=`<button class="btn br" onclick="setPhase('revealed')">💡 REVELAR RESPOSTA</button>`;
  }
  if(phase==='revealed'){
    card.innerHTML=`
      <span class="score-tag">${done.size}/${LIGHTS.length}</span>
      <div class="qphase">✅ RESPOSTA</div>
      <div class="q-icon" style="color:${c}">${l.svg}</div>
      <div class="qname" style="color:${c}">${l.nome}</div>
      <div class="qdesc">${l.desc}</div>
    `;
    brow.innerHTML=`
      <button class="btn bm" onclick="setPhase('detail')">🎙️ VOU EXPLICAR DETALHADO</button>
      <button class="btn bn" onclick="markNext()">⏭ PRÓXIMA LUZ</button>
    `;
  }
  if(phase==='detail'){
    done.add(curIdx);
    document.getElementById(`lc${curIdx}`).classList.add('done');
    pf.style.width=`${(done.size/LIGHTS.length)*100}%`;
    st.textContent=`${done.size}/${LIGHTS.length}`;
    card.innerHTML=`
      <span class="score-tag">${done.size}/${LIGHTS.length}</span>
      <div class="qphase">🎓 EXPLICAÇÃO COMPLETA — FORD FUSION 2020</div>
      <div class="q-icon" style="color:${c}">${l.svg}</div>
      <div class="qname" style="color:${c}">${l.nome}</div>
      <div class="detail-box">
        <div class="dtitle">📋 DETALHES TÉCNICOS</div>
        <div class="dtext">${l.detail}</div>
      </div>
    `;
    const extra=done.size>=LIGHTS.length?`<button class="btn bx" onclick="restart()">🔄 REINICIAR</button>`:'';
    brow.innerHTML=`<button class="btn bn" onclick="nextLight()">⏭ PRÓXIMA LUZ</button>${extra}`;
  }
}

function setPhase(p){phase=p;render();}
function markNext(){done.add(curIdx);document.getElementById(`lc${curIdx}`).classList.add('done');nextLight();}

function showComplete(){
  document.querySelectorAll('.lc.active').forEach(c=>c.classList.remove('active'));
  document.getElementById('qcard').innerHTML=`
    <div style="font-size:60px;margin-bottom:10px">🏆</div>
    <div class="qphase" style="font-size:14px">PARABÉNS!</div>
    <div class="qname" style="color:#ffaa00;margin-top:8px">TODAS AS LUZES EXPLICADAS!</div>
    <div class="qdesc" style="margin-top:8px">Você cobriu todas as ${LIGHTS.length} luzes de alerta do Ford Fusion 2020.</div>
  `;
  document.getElementById('brow').innerHTML=`<button class="btn bx" onclick="restart()">🔄 REINICIAR QUIZ</button>`;
}

function restart(){
  done.clear();orderPos=0;order=shuffle(LIGHTS.map((_,i)=>i));
  document.querySelectorAll('.lc').forEach(c=>c.classList.remove('active','done'));
  document.getElementById('pf').style.width='0%';
  document.getElementById('stag').textContent='0/'+LIGHTS.length;
  document.getElementById('qcard').innerHTML=`<span class="score-tag">0/${LIGHTS.length}</span><div class="idle">Reiniciando...</div>`;
  document.getElementById('brow').innerHTML='';
  setTimeout(nextLight,600);
}

setTimeout(nextLight,900);
</script>
</body>
</html>
